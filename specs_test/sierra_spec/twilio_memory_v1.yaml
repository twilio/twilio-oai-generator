---
openapi: 3.0.1
info:
  title: Twilio Memory API
  description: APIs for managing memory stores, profiles, events, and conversational
    intelligence capabilities.
  version: '1.0'
  termsOfService: https://www.twilio.com/legal/tos
  contact:
    name: Twilio Support
    url: https://support.twilio.com
    email: support@twilio.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  x-twilio:
    apiStandards: v1.0
servers:
- url: https://memory.twilio.com
paths:
  "/v1/Stores/{storeId}/Profiles/{profileId}":
    servers:
    - url: https://memory.twilio.com
    parameters:
    - "$ref": "#/components/parameters/StoreId"
    - "$ref": "#/components/parameters/ProfileId"
    x-twilio:
      pathType: instance
    delete:
      operationId: DeleteProfile
      summary: Delete Profile
      description: Asynchronously delete the profile permanently and all associated
        identifiers and traits. This operation is irreversible. Downstream caches
        or analytical stores may take time to reflect the deletion. Use cautiously
        and consider a soft‑delete strategy if regulatory or recovery requirements
        apply.
      tags:
      - Profile
      responses:
        '202':
          description: Profile deletion accepted.
          content:
            application/json:
              schema:
                type: object
                required:
                - message
                properties:
                  message:
                    type: string
                    maxLength: 512
                    example: Profile accepted for deletion.
              examples:
                Accepted:
                  value:
                    message: Profile accepted for deletion.
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/TooManyRequests"
        '500':
          "$ref": "#/components/responses/InternalServerError"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
    get:
      operationId: FetchProfile
      summary: Get Profile
      description: Retrieve profile traits by profile ID. Use the `traitGroups` query
        parameter to restrict results to a comma-separated allow list of trait group
        names. For large sets of traits, prefer using the dedicated `/Traits` endpoint
        for pagination.
      tags:
      - Profile
      parameters:
      - "$ref": "#/components/parameters/TraitGroupsQueryParam"
      responses:
        '200':
          description: A profile.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Profile"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/TooManyRequests"
        '500':
          "$ref": "#/components/responses/InternalServerError"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
    patch:
      operationId: UpdateProfileTraits
      summary: Patch Profile Traits
      description: Merge one or more trait groups into an existing profile. Only the
        traits provided are added or updated; unspecified traits remain unchanged.
      tags:
      - Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ProfilePatch"
            example:
              traits:
                Activity:
                  lastVisited: '2024-10-07T15:39:25Z'
      responses:
        '202':
          description: Trait patch accepted.
          content:
            application/json:
              schema:
                type: object
                required:
                - message
                properties:
                  message:
                    type: string
                    example: Trait modifications accepted for processing.
                    maxLength: 255
                maxProperties: 1
              examples:
                Accepted:
                  value:
                    message: Trait modifications accepted for processing.
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/TooManyRequests"
        '500':
          "$ref": "#/components/responses/InternalServerError"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
  "/v1/Stores/{storeId}/Profiles/Lookup":
    servers:
    - url: https://memory.twilio.com
    parameters:
    - "$ref": "#/components/parameters/StoreId"
    x-twilio:
      pathType: instance
    post:
      operationId: CreateProfilesLookup
      summary: Lookup Profiles
      description: Find profiles that contain a specific identifier value (for example
        a phone number or email address). Submit an identifier object specifying the
        `idType` and `value`. The value is normalized using the configured identity
        resolution settings (such as phone number formatting) prior to matching. Multiple
        matches are returned if more than one profile is associated with the identifier.
        Returns canonical profile IDs (the earliest ID if profiles have been merged)
        along with the normalized value actually searched.
      tags:
      - Retrieval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/Identifier"
            example:
              idType: phone
              value: 1-317-555-6789
      responses:
        '200':
          description: A list of profiles found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  normalizedValue:
                    type: string
                    maxLength: 255
                    description: Identifier value after normalization that was used
                      for the lookup.
                    example: "+13175556789"
                  profiles:
                    type: array
                    maxItems: 100
                    items:
                      "$ref": "#/components/schemas/IdentityProfileID"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/TooManyRequests"
        '500':
          "$ref": "#/components/responses/InternalServerError"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
  "/v1/Stores/{storeId}/Profiles/{profileId}/Identifiers":
    servers:
    - url: https://memory.twilio.com
    parameters:
    - "$ref": "#/components/parameters/StoreId"
    - "$ref": "#/components/parameters/ProfileId"
    x-twilio:
      defaultOutputProperties:
      - identifiers
      pathType: list
    get:
      operationId: ListProfileIdentifiers
      summary: List Profile Identifiers
      description: Retrieve all identifier types linked to a profile along with their
        stored values. Use this to audit which external keys (phone, email, externalId,
        etc.) are currently associated. Values are returned in the order enforced
        by each identifier settings `limitPolicy` and reflect any normalization applied
        by the service.
      tags:
      - Identifiers
      responses:
        '200':
          description: A list of identifiers.
          content:
            application/json:
              schema:
                type: object
                properties:
                  identifiers:
                    type: array
                    maxItems: 50
                    items:
                      "$ref": "#/components/schemas/IdentifierSet"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/TooManyRequests"
        '500':
          "$ref": "#/components/responses/InternalServerError"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
    post:
      operationId: CreateProfileIdentifier
      summary: Add Profile Identifier
      description: Asynchronously attach a new identifier value to a profile. When
        multiple values exist for an `idType`, ordering, limits, and uniqueness checks
        are enforced by the corresponding identifier settings `limitPolicy` and  reflect
        any normalization. If the identifier already exists and points to another
        profile, resolution rules or merge processes may apply. Use the identifier
        specific endpoint to inspect, update, or remove existing values.
      tags:
      - Identifiers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/Identifier"
            example:
              idType: phone
              value: "+13175556789"
      responses:
        '202':
          description: Identifier association accepted.
          content:
            application/json:
              schema:
                type: object
                required:
                - message
                properties:
                  message:
                    type: string
                    maxLength: 512
                    example: Identifier accepted for processing.
              examples:
                Accepted:
                  value:
                    message: Identifier accepted for processing.
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/TooManyRequests"
        '500':
          "$ref": "#/components/responses/InternalServerError"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
  "/v1/Stores/{storeId}/Profiles/{profileId}/Identifiers/{idType}":
    servers:
    - url: https://memory.twilio.com
    parameters:
    - "$ref": "#/components/parameters/StoreId"
    - "$ref": "#/components/parameters/ProfileId"
    - "$ref": "#/components/parameters/IdentifierType"
    x-twilio:
      pathType: instance
    get:
      operationId: FetchProfileIdentifier
      summary: Retrieve Profile Identifier
      description: Retrieve all stored values for a specific identifier type on a
        profile. Values are normalized according to the configured identifier settings
        and returned in the order determined by its `limitPolicy`.
      tags:
      - Identifiers
      responses:
        '200':
          description: Identifier values associated with the requested type.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/IdentifierSet"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/TooManyRequests"
        '500':
          "$ref": "#/components/responses/InternalServerError"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
    patch:
      operationId: UpdateProfileIdentifier
      summary: Modify Profile Identifier
      description: "Asynchronously replace one of the stored values associated with
        the\nidentifier type on a profile. `newValue` is normalized according to\nthe
        configured identifier settings. \n\nIf the new identifier already exists and
        points to another profile,\nmerge processes may apply."
      tags:
      - Identifiers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/IdentifierUpdate"
            example:
              idType: phone
              oldValue: "+13175556789"
              newValue: "+13175556798"
      responses:
        '202':
          description: Identifier update accepted.
          content:
            application/json:
              schema:
                type: object
                required:
                - message
                properties:
                  message:
                    type: string
                    maxLength: 512
                    example: Identifier update accepted.
              examples:
                Accepted:
                  value:
                    message: Identifier update accepted.
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '409':
          "$ref": "#/components/responses/Conflict"
        '429':
          "$ref": "#/components/responses/TooManyRequests"
        '500':
          "$ref": "#/components/responses/InternalServerError"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
    delete:
      operationId: DeleteProfileIdentifier
      summary: Remove Profile Identifier
      description: Asynchronously remove stored values for the identifier type. The
        optional `removeAll` query parameter allows bulk removal; otherwise the service
        selects a single value to delete using the identifier settings `limitPolicy`.
      tags:
      - Identifiers
      parameters:
      - name: removeAll
        in: query
        required: false
        description: When true, removes every stored value for the identifier type
          in a single operation. Defaults to false.
        schema:
          type: boolean
          default: false
      responses:
        '202':
          description: Identifier removal accepted.
          content:
            application/json:
              schema:
                type: object
                required:
                - message
                properties:
                  message:
                    type: string
                    maxLength: 512
                    example: Identifier removal accepted.
              examples:
                Accepted:
                  value:
                    message: Identifier removal accepted.
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/TooManyRequests"
        '500':
          "$ref": "#/components/responses/InternalServerError"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
  "/v1/Stores/{storeId}/Profiles/{profileId}/Recall":
    servers:
    - url: https://memory.twilio.com
    parameters:
    - "$ref": "#/components/parameters/StoreId"
    - "$ref": "#/components/parameters/ProfileId"
    x-twilio:
      pathType: instance
    post:
      operationId: FetchProfileMemory
      summary: Retrieve Memories
      description: Tailored memory retrieval for agentic workloads. Supports hybrid
        semantic search, date ranges, and configurable result limits for different
        memory types. This endpoint is optimized for conversational AI and memory
        retrieval use cases. If a query is not specified then one is inferred from
        the conversation context.
      tags:
      - Retrieval
      parameters:
      - "$ref": "#/components/parameters/AcceptEncoding"
      - "$ref": "#/components/parameters/ContentEncoding"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/MemoryRetrievalRequest"
            examples:
              Basic Query:
                value:
                  query: customer satisfaction feedback
                  conversationId: conv_conversation_00000000000000000000000000
                  communicationsLimit: 10
                  observationsLimit: 20
                  summariesLimit: 5
              Retrieval without Query field:
                value:
                  conversationId: conv_conversation_00000000000000000000000000
                  beginDate: '2025-01-15T00:00:00Z'
                  communicationsLimit: 15
                  observationsLimit: 25
                  summariesLimit: 10
      responses:
        '200':
          description: Memory retrieval results returned successfully.
          headers:
            Content-Encoding:
              "$ref": "#/components/headers/ContentEncoding"
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/MemoryRetrievalResponse"
              examples:
                Basic Results:
                  value:
                    observations:
                    - id: mem_observation_00000000000000000000000001
                      content: Customer expressed satisfaction with recent product
                        update during support call.
                      source: customer_service
                      occurredAt: '2025-01-15T10:15:30Z'
                      createdAt: '2025-01-15T10:30:45Z'
                      updatedAt: '2025-01-15T10:30:45Z'
                    summaries: []
                    communications: []
                    meta:
                      queryTime: 156
                Retrieval without Query field Results:
                  value:
                    observations: []
                    summaries:
                    - id: mem_summary_00000000000000000000000002
                      conversationId: conv_conversation_00000000000000000000000000
                      content: Recent conversation indicates continued billing visibility
                        concerns; reassurance provided.
                      source: summary_operator
                      occurredAt: '2025-01-15T16:00:00Z'
                      createdAt: '2025-01-15T16:00:10Z'
                      updatedAt: '2025-01-15T16:00:10Z'
                      score: 0.78
                    communications:
                    - id: conv_communication_00000000000000000000000000
                      author:
                        id: conv_participant_00000000000000000000000000
                        name: Customer
                        address: "+12025551234"
                        channel: SMS
                      channelId: SM00000000000000000000000000000000
                      content:
                        text: Hey, I still can't see the new charges on my account.
                      createdAt: '2025-01-15T15:58:10Z'
                      recipients:
                      - id: conv_participant_00000000000000000000000001
                        name: Agent
                        address: "+12025555678"
                        channel: SMS
                    - id: conv_communication_00000000000000000000000001
                      author:
                        id: conv_participant_00000000000000000000000001
                        name: Agent
                        address: "+12025555678"
                        channel: SMS
                      channelId: SM00000000000000000000000000000000
                      content:
                        text: Thanks for checking in. The billing refresh is in progress
                          and should finish shortly.
                      createdAt: '2025-01-15T15:59:05Z'
                      recipients:
                      - id: conv_participant_00000000000000000000000000
                        name: Customer
                        address: "+12025551234"
                        channel: SMS
                    meta:
                      queryTime: 142
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/TooManyRequests"
        '500':
          "$ref": "#/components/responses/InternalServerError"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
  "/v1/Stores/{storeId}/Profiles/{profileId}/Observations":
    servers:
    - url: https://memory.twilio.com
    parameters:
    - "$ref": "#/components/parameters/StoreId"
    - "$ref": "#/components/parameters/ProfileId"
    x-twilio:
      defaultOutputProperties:
      - observations
      pathType: list
    get:
      operationId: ListProfileObservations
      summary: List Observations
      description: Retrieve a paginated list of transient observations for a specific
        profile. Observations are sorted by creation time in descending order by default.
        Results can be filtered by source parameter. Supports response compression
        for large datasets.
      tags:
      - Observations
      parameters:
      - "$ref": "#/components/parameters/PageSize"
      - "$ref": "#/components/parameters/PageToken"
      - "$ref": "#/components/parameters/OrderBy"
      - "$ref": "#/components/parameters/SourceParam"
      - "$ref": "#/components/parameters/CreatedAfter"
      - "$ref": "#/components/parameters/CreatedBefore"
      - "$ref": "#/components/parameters/AcceptEncoding"
      responses:
        '200':
          description: A list of observations for the profile.
          headers:
            Content-Encoding:
              "$ref": "#/components/headers/ContentEncoding"
          content:
            application/json:
              schema:
                type: object
                properties:
                  observations:
                    type: array
                    maxItems: 50
                    items:
                      "$ref": "#/components/schemas/ObservationInfo"
                  meta:
                    "$ref": "#/components/schemas/ObservationsMeta"
              example:
                observations:
                - id: mem_observation_00000000000000000000000001
                  content: Customer expressed frustration with billing process during
                    call on 2025-01-15. Mentioned difficulty understanding charges.
                  source: customer_service
                  occurredAt: '2025-01-15T14:30:00Z'
                  createdAt: '2025-01-15T10:30:45Z'
                  updatedAt: '2025-01-15T10:30:45Z'
                - id: mem_observation_00000000000000000000000002
                  conversationIds:
                  - conv_conversation_00000000000000000000000000
                  content: 'Customer: ''I love the new feature you added.'' Agent:
                    ''Thank you for the feedback, we''re glad you''re enjoying it.'''
                  source: chat_transcript
                  occurredAt: '2025-01-15T14:30:00Z'
                  createdAt: '2025-01-15T11:15:30Z'
                  updatedAt: '2025-01-15T11:15:30Z'
                meta:
                  pageSize: 2
                  nextToken: eyJlYXN0ZXIiOiJlZ2cifQ
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/TooManyRequests"
        '500':
          "$ref": "#/components/responses/InternalServerError"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
    post:
      operationId: CreateProfileObservation
      summary: Create Observations
      description: Create one or more transient observations associated with the specified
        profile. Supports both single observation creation and batch creation of up
        to 10 observations. Supports request compression for large batch operations
        and response compression for the response. All observations will be automatically
        indexed for semantic search capabilities. The content can be up to 4KB in
        length and should contain relevant information about the profile. The createdAt
        and updatedAt timestamps will be automatically set to the current time. Each
        observation will be created with a unique ID in Twilio Type ID (TTID) format.
      tags:
      - Observations
      parameters:
      - "$ref": "#/components/parameters/AcceptEncoding"
      - "$ref": "#/components/parameters/ContentEncoding"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateObservationsRequest"
            examples:
              Single Observation:
                value:
                  observations:
                  - content: Customer expressed frustration with billing process during
                      call on 2025-01-15. Mentioned difficulty understanding charges.
                    source: customer_service
                    occurredAt: '2025-01-15T14:30:00Z'
              Batch Observations:
                value:
                  observations:
                  - content: Customer expressed frustration with billing process during
                      call on 2025-01-15. Mentioned difficulty understanding charges.
                    source: customer_service
                    occurredAt: '2025-01-15T14:30:00Z'
                  - content: 'Customer: ''I love the new feature you added.'' Agent:
                      ''Thank you for the feedback, we''re glad you''re enjoying it.'''
                    source: chat_transcript
                    occurredAt: '2025-01-15T15:30:00Z'
                    conversationIds:
                    - conv_conversation_00000000000000000000000000
      responses:
        '202':
          description: Observation creation accepted and is being processed.
          headers:
            Content-Encoding:
              "$ref": "#/components/headers/ContentEncoding"
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ObservationCreatedResponse"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/TooManyRequests"
        '500':
          "$ref": "#/components/responses/InternalServerError"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
  "/v1/Stores/{storeId}/Profiles/{profileId}/Observations/{observationId}":
    servers:
    - url: https://memory.twilio.com
    parameters:
    - "$ref": "#/components/parameters/StoreId"
    - "$ref": "#/components/parameters/ProfileId"
    - "$ref": "#/components/parameters/ObservationId"
    x-twilio:
      pathType: instance
    get:
      operationId: FetchProfileObservation
      summary: Retrieve Observation
      description: Retrieve a specific transient observation by its ID for the given
        profile.
      tags:
      - Observations
      responses:
        '200':
          description: Observation retrieved successfully.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ObservationInfo"
              examples:
                Conversation Observation:
                  value:
                    id: mem_observation_00000000000000000000000001
                    content: Customer expressed frustration with billing process during
                      call on 2025-01-15. Mentioned difficulty understanding charges.
                    source: customer_service
                    occurredAt: '2025-01-15T14:30:00Z'
                    conversationIds:
                    - conv_conversation_00000000000000000000000000
                    createdAt: '2025-01-15T10:30:45Z'
                    updatedAt: '2025-01-15T10:30:45Z'
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/TooManyRequests"
        '500':
          "$ref": "#/components/responses/InternalServerError"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
    patch:
      operationId: UpdateProfileObservation
      summary: Update Observation
      description: Update a specific transient observation by its ID. Only provided
        fields will be updated. The updated timestamp will be automatically set. This
        allows for selective updates without needing to provide all fields.
      tags:
      - Observations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ObservationCore"
            examples:
              Update Content Only:
                value:
                  content: 'Updated: Customer expressed satisfaction with recent product
                    update during support call. Follow-up scheduled.'
                  source: customer_service
                  occurredAt: '2025-01-15T16:00:00Z'
              Update Source:
                value:
                  content: Customer preferences noted during interaction.
                  source: customer_service_followup
                  occurredAt: '2025-01-15T16:30:00Z'
              Update Intelligent Operator Fields:
                value:
                  content: Analysis updated with improved confidence assessment.
