      description: Initiate a profile import by requesting a pre-signed upload URL
        and an associated `importId`. Upload your CSV to the returned URL (single
        PUT). Query the import status endpoint to track processing progress. This
        endpoint creates the import task and allocates resources for subsequent ingestion.
      tags:
      - Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filename:
                  type: string
                  description: The name of the file to generate a presigned URL
                  maxLength: 255
                fileSize:
                  type: integer
                  description: The size of the file in bytes (1 byte to 100 MiB)
                  minimum: 1
                  maximum: 104857600
                columnMappings:
                  type: array
                  description: Mappings of CSV header columns to traits' fields
                  maxItems: 100
                  minItems: 2
                  items:
                    "$ref": "#/components/schemas/ColumnMappingItem"
              required:
              - filename
              - fileSize
              - columnMappings
              maxProperties: 3
            example:
              filename: profiles_import.csv
              fileSize: 204800
              columnMappings:
              - columnName: first_name
                traitGroup: Contact
                traitName: firstName
              - columnName: last_name
                traitGroup: Contact
                traitName: lastName
              - columnName: email_address
                traitGroup: Contact
                traitName: email
      responses:
        '201':
          description: Import task created.
          content:
            application/json:
              schema:
                type: object
                required:
                - importId
                - url
                properties:
                  importId:
                    type: string
                    description: ID of the import task.
                    example: mem_import_00000000000000000000000000
                    maxLength: 39
                  url:
                    type: string
                    description: Pre-signed URL to upload the CSV via a single PUT
                      request.
                    example: https://unified-profiles-csv-upload-stage-us-east-1.s3.amazonaws.com/object.txt?AWSAccessKeyId=AKIAIOSFODNN7EXAMPLE&Signature=vjbyNxybdZaMmLa%2ByT372YEAiv4%3D&Expires=1741978496
                    maxLength: 2048
                maxProperties: 2
              examples:
                Created:
                  summary: Example created import
                  value:
                    importId: mem_import_00000000000000000000000000
                    url: https://unified-profiles-csv-upload-stage-us-east-1.s3.amazonaws.com/object.txt?AWSAccessKeyId=AKIA...
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/TooManyRequests"
        '500':
          "$ref": "#/components/responses/InternalServerError"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
  "/v1/Stores/{storeId}/Profiles/Imports/{importId}":
    servers:
    - url: https://memory.twilio.com
    parameters:
    - "$ref": "#/components/parameters/StoreId"
    - "$ref": "#/components/parameters/ImportId"
    x-twilio:
      defaultOutputProperties:
      - status
      - filename
      - createdAt
      pathType: instance
    get:
      operationId: FetchProfileImportV2
      summary: Get Import Status
      description: Retrieve the current processing status of a previously submitted
        bulk import task. Query this endpoint using the `importId` returned from the
        upload URL request until a terminal state (COMPLETED or FAILED) is reached.
      tags:
      - Profile
      responses:
        '200':
          description: Import Status.
          content:
            application/json:
              schema:
                type: object
                required:
                - status
                - filename
                - createdAt
                properties:
                  status:
                    type: string
                    enum:
                    - PENDING
                    - PROCESSING
                    - COMPLETED
                    - FAILED
                    description: Current processing status of the import task
                  filename:
                    type: string
                    description: Original filename of the uploaded CSV
                    maxLength: 255
                    example: profiles_import.csv
                  createdAt:
                    type: string
                    format: date-time
                    description: Timestamp when the import was created
                    example: '2025-11-14T20:29:21Z'
                  updatedAt:
                    type: string
                    format: date-time
                    description: Timestamp when the import was last updated
                    example: '2025-11-14T20:30:15Z'
                  fileSize:
                    type: integer
                    description: Size of the uploaded file in bytes (1 byte to 100
                      MiB)
                    minimum: 1
                    maximum: 104857600
                    example: 204800
                  columnMappings:
                    type: array
                    description: Mappings of CSV header columns to traits' fields
                    maxItems: 100
                    minItems: 2
                    items:
                      "$ref": "#/components/schemas/ColumnMappingItem"
                  summary:
                    type: object
                    description: Summary statistics of the import operation
                    properties:
                      errors:
                        type: integer
                        description: Total count of errors encountered during import
                        example: 10
                      warnings:
                        type: integer
                        description: Total count of warnings encountered during import
                        example: 5
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/TooManyRequests"
        '500':
          "$ref": "#/components/responses/InternalServerError"
        '503':
          "$ref": "#/components/responses/ServiceUnavailable"
components:
  securitySchemes:
    basic_apikey_or_accountsid:
      scheme: basic
      type: http
      description: This API uses [basic authentication](https://www.twilio.com/docs/glossary/what-is-basic-authentication).
        Use an [API key](https://www.twilio.com/docs/iam/api-keys) as the username
        and the API key secret as the password. You can also use your account SID
        and auth token, but limit their use to local testing.
    accountSid_authToken:
      scheme: basic
      type: http
  schemas:
    TwilioError:
      type: object
      additionalProperties: false
      maxProperties: 10
      description: A generic error object communicating client and server side API
        errors.
      properties:
        code:
          type: integer
          minimum: 100
          maximum: 99999
          description: The Twilio error code.
          format: int32
        message:
          type: string
          maxLength: 1024
          description: A human readable message describing the error.
        more_info:
          type: string
          description: A URL to a [Twilio error directory](https://www.twilio.com/docs/api/errors)
            page with more information about the error code.
        status:
          type: integer
          minimum: 100
          maximum: 599
          description: The HTTP status code for the error.
          format: int32
      example:
        code: 21614
        message: The address specified in the request is not a valid phone number.
        more_info: https://www.twilio.com/docs/api/errors/21614
        status: 400
    IdentityProfileID:
      type: string
      pattern: "^mem_profile_[0-7][0-9a-z]{25}$"
      example: mem_profile_00000000000000000000000000
      description: The canonical profile ID.
    Identifier:
      type: object
      additionalProperties: false
      required:
      - idType
      - value
      description: Represents a single identifier value paired with its `idType`.
        Write operations obey limits, uniqueness, and normalization rules configured
        via identifier settings.
      properties:
        idType:
          type: string
          description: Identifier type as configured in the service's Identity Resolution
            Settings. Must match an `idType` defined in the corresponding identifier
            settings and must satisfy the same length constraints.
          minLength: 2
          maxLength: 30
          example: phone
        value:
          type: string
          description: Raw value captured for the identifier. The service may normalize
            this value according to the `normalization` rule defined in the identifier
            settings before storage or matching (for example E.164 formatting for
            phone numbers).
          maxLength: 255
          example: "+13175556789"
    IdentifierSet:
      type: object
      additionalProperties: false
      required:
      - idType
      - values
      description: All the known values for a specific identifier type. These are
        normalized according to the corresponding identifier settings and ordered
        chronologically. It includes any promoted values from traits and explicitly
        set values from API calls, both historical and current.
      properties:
        idType:
          type: string
          description: Identifier type defined in Identity Resolution Settings.
          minLength: 2
          maxLength: 30
          example: email
        values:
          type: array
          maxItems: 20
          description: Server managed collection of stored values for the identifier
            type.  Identifier values are normalized according to the corresponding
            identifier settings and ordered chronologically.
          items:
            type: string
            maxLength: 255
          example:
          - primary@example.com
          - backup@example.com
    IdentifierUpdate:
      type: object
      additionalProperties: false
      required:
      - idType
      - oldValue
      - newValue
      properties:
        idType:
          type: string
          description: The identifier type to update (e.g., email, phone).
          minLength: 2
          maxLength: 30
          example: phone
        oldValue:
          type: string
          description: Existing stored value to replace.
          maxLength: 255
          example: "+13175556789"
        newValue:
          type: string
          description: New value to store for the identifier. Normalization rules
            from the corresponding identifier settings apply.
          maxLength: 255
          example: "+13175556798"
    ObservationID:
      type: string
      description: A unique identifier for the observation using Twilio Type ID (TTID)
        format.
      pattern: "^mem_observation_[0-7][0-9a-z]{25}$"
      example: mem_observation_00000000000000000000000000
    SummaryID:
      type: string
      description: A unique identifier for the summary using Twilio Type ID (TTID)
        format.
      pattern: "^mem_summary_[0-7][0-9a-z]{25}$"
      example: mem_summary_00000000000000000000000000
    ConversationID:
      type: string
      description: A unique identifier for the conversation using Twilio Type ID (TTID)
        format.
      pattern: "^conv_conversation_[0-7][0-9a-z]{25}$"
      example: conv_conversation_00000000000000000000000000
    ObservationCore:
      type: object
      description: Core mutable properties for creating observation objects.
      properties:
        content:
          type: string
          description: The main content of the observation.
          minLength: 1
          maxLength: 4096
          example: Customer expressed satisfaction with recent product update during
            support call.
        occurredAt:
          type: string
          format: date-time
          description: The timestamp when the observation originally occurred.
          example: '2025-01-15T10:15:30Z'
        source:
          type: string
          description: The source system that generated this observation. Allows letters,
            numbers, spaces, and URL-safe symbols. Excludes URL-unsafe characters
            like quotes, angle brackets, and control characters.
          minLength: 1
          maxLength: 100
          pattern: "^[a-zA-Z0-9 _.-]+$"
          example: conversational-intelligence
        conversationIds:
          type: array
          description: Array of conversation IDs associated with this observation.
          maxItems: 10
          items:
            "$ref": "#/components/schemas/ConversationID"
      required:
      - content
      - source
      - occurredAt
    ObservationInfo:
      type: object
      description: A transient and mutable observation memory associated with a profile.
    SummaryCore:
      type: object
      description: Core mutable properties for creating summary objects.
      properties:
        source:
          type: string
          description: The source system that generated the summary. Allows letters,
            numbers, spaces, and URL-safe symbols. Excludes URL-unsafe characters
            like quotes, angle brackets, and control characters.
          maxLength: 100
          pattern: "^[a-zA-Z0-9 _.-]+$"
          example: conversations
        content:
          type: string
          description: The main content of the summary.
          minLength: 1
          maxLength: 4096
          example: Customer discussed billing concerns and was satisfied with the
            resolution provided during this conversation.
        occurredAt:
          type: string
          format: date-time
          description: The timestamp when the summary was originally created.
          example: '2025-01-15T10:15:30Z'
        conversationId:
          "$ref": "#/components/schemas/ConversationID"
      required:
      - content
      - conversationId
      - occurredAt
    SummaryInfo:
      type: object
      description: A summary memory derived from conversations.
      allOf:
      - "$ref": "#/components/schemas/SummaryCore"
      - type: object
        properties:
          id:
            "$ref": "#/components/schemas/SummaryID"
          createdAt:
            type: string
            format: date-time
            description: The timestamp when the summary was created.
            example: '2025-01-15T10:30:45Z'
          updatedAt:
            type: string
            format: date-time
            description: The timestamp when the summary was last updated.
            example: '2025-01-15T10:30:45Z'
        required:
        - id
        - createdAt
        - updatedAt
    Participant:
      type: object
      required:
      - id
      - name
      - address
      - channel
      properties:
        id:
          type: string
          description: Participant identifier.
          pattern: "^conv_participant_[0-7][0-9a-z]{25}$"
          example: conv_participant_00000000000000000000000000
        name:
          type: string
          maxLength: 256
          description: Participant display name
        type:
          "$ref": "#/components/schemas/ParticipantType"
          description: Type of Participant in the Conversation
        profileId:
          type: string
          pattern: "^mem_profile_[0-7][0-9a-z]{25}$"
          example: mem_profile_00000000000000000000000000
          description: The canonical profile ID.
        address:
          type: string
          description: Address of the Participant (e.g., phone number, email address)
          example: "+12025551234"
          maxLength: 254
        channel:
          type: string
          description: The channel on which the message originated
          enum:
          - VOICE
          - SMS
          - RCS
          - EMAIL
          - WHATSAPP
          - CHAT
          - API
          - SYSTEM
    ParticipantType:
      type: string
      description: Type of Participant in the Conversation
      enum:
      - HUMAN_AGENT
      - CUSTOMER
      - AI_AGENT
    CommunicationContent:
      type: object
      description: Content of a communication.
      properties:
        text:
          type: string
          description: Primary text content (optional).
          maxLength: 8388608
          example: Hello, I need help with my account
    Communication:
      type: object
      description: A single communication within a conversation across channels including
        SMS, Voice, Email, etc. Contains fields that are relevant to an agent to maintain
        session memory.
      properties:
        id:
          type: string
          description: Unique communication identifier.
          pattern: "^conv_communication_[0-7][0-9a-z]{25}$"
          example: conv_communication_00000000000000000000000000
        channelId:
          type: string
          maxLength: 256
          description: Channel-specific ID (optional).
          example: SM00000000000000000000000000000000
        content:
          "$ref": "#/components/schemas/CommunicationContent"
        createdAt:
          type: string
          format: date-time
          description: When communication was created.
          example: '2025-01-15T10:15:30Z'
        updatedAt:
          type: string
          format: date-time
          description: When communication was last updated.
          example: '2025-01-15T10:20:30Z'
        author:
          "$ref": "#/components/schemas/Participant"
        recipients:
          type: array
          maxItems: 100
          description: Communication recipients
          items:
            type: object
      required:
      - id
      - author
      - content
      - recipients
    MemoryRetrievalRequest:
      type: object
      description: Request payload for retrieving profile memories with advanced filtering
        and semantic search.
      properties:
        conversationId:
          "$ref": "#/components/schemas/ConversationID"
          description: Required for session memory and query expansion.
        query:
          type: string
          description: Hybrid search query for finding relevant memories. Omit to
            use query expansion to generate query from previous 10 communications
            in conversation.
          minLength: 0
          maxLength: 1024
          example: customer satisfaction feedback
        beginDate:
          type: string
          format: date-time
          description: Start date for filtering memories (inclusive).
          example: '2025-01-01T00:00:00Z'
        endDate:
          type: string
          format: date-time
          description: End date for filtering memories (exclusive).
          example: '2025-01-31T23:59:59Z'
        communicationsLimit:
          type: integer
          description: Maximum number of conversational session memories to return.
            If omitted or set to 0, no session memories will be fetched.
          minimum: 0
          maximum: 100
          default: 0
          example: 10
        observationsLimit:
          type: integer
          description: Maximum number of observation memories to return. If omitted,
            defaults to 20. If set to 0, no observation memories will be fetched.
          minimum: 0
          maximum: 100
          default: 20
          example: 20
        summariesLimit:
          type: integer
          description: Maximum number of summary memories to return. If omitted, defaults
            to 5. If set to 0, no summary memories will be fetched.
          minimum: 0
          maximum: 100
          default: 5
          example: 5
        relevanceThreshold:
          type: number
          format: double
          description: Minimum relevance score threshold for observations and summaries
            to be returned. Only memories with a relevance score greater than or equal
            to this threshold will be included in the response.
          minimum: 0
          maximum: 1
          default: 0
          example: 0.5
    MemoryRetrievalResponse:
      type: object
      description: Response containing retrieved profile memories organized by type.
      properties:
        observations:
          type: array
          description: Array of observation memories.
          maxItems: 100
          items:
            "$ref": "#/components/schemas/RecallObservationInfo"
        summaries:
          type: array
          description: Array of summary memories derived from observations at the
            end of conversations.
          maxItems: 100
          items:
            "$ref": "#/components/schemas/RecallSummaryInfo"
        communications:
          type: array
          description: Array of recent communication context.
          minItems: 0
          maxItems: 100
          items:
            "$ref": "#/components/schemas/Communication"
        meta:
          type: object
          description: Metadata about the retrieval operation.
          properties:
            queryTime:
              type: integer
              description: Query execution time in milliseconds.
              minimum: 0
              maximum: 600000
              example: 156
          required:
          - queryTime
      required:
      - observations
      - summaries
      - communications
      - meta
    ObservationsMeta:
      type: object
      properties:
        key:
          type: string
          nullable: false
          maxLength: 64
          description: |
            The key of the list property contains the actual data items.
            This enables programmatic iteration over paginated results.
          example: observations
        pageSize:
          type: integer
          minimum: 1
          maximum: 50
          default: 50
        nextToken:
          type: string
          minLength: 1
          maxLength: 4096
          example: eyJlYXN0ZXIiOiJlZ2cifQ
        previousToken:
          type: string
          minLength: 1
          maxLength: 4096
          example: eyJlYXN0ZXIiOiJlZ2cifQ
    CreateObservationsRequest:
      type: object
      description: Request payload for creating one or more observations. Supports
        creation of up to 10 observations.
      properties:
        observations:
          type: array
          description: Array of observations to create in a single batch operation.
          minItems: 1
          maxItems: 10
          items:
            "$ref": "#/components/schemas/ObservationCore"
      required:
      - observations
      additionalProperties: false
    ObservationCreatedResponse:
      type: object
      description: Response for batch observation creation.
      properties:
        message:
          type: string
          description: Confirmation message for the operation.
          minLength: 1
          maxLength: 255
          example: Observations creation accepted
      required:
      - message
    CreateSummariesRequest:
      type: object
      description: Request payload for creating one or more conversation summaries.
        Supports creation of up to 10 summaries.
      properties:
        summaries:
          type: array
          description: Array of summaries to create in a single batch operation.
          minItems: 1
          maxItems: 10
          items:
            "$ref": "#/components/schemas/SummaryCore"
      required:
      - summaries
      additionalProperties: false
    SummariesCreatedResponse:
      type: object
      description: Response for batch summary creation.
      properties:
        message:
          type: string
          description: Confirmation message for the operation.
          minLength: 1
          maxLength: 255
          example: Summaries creation accepted
      required:
      - message
    ProfilesMeta:
      type: object
      maxProperties: 4
      properties:
        key:
          type: string
          nullable: false
          maxLength: 64
          description: |
            The key of the list property contains the actual data items.
            This enables programmatic iteration over paginated results.
          example: profiles
        pageSize:
          type: integer
          default: 50
        nextToken:
          type: string
          example: eyJlYXN0ZXIiOiJlZ2cifQ
          maxLength: 4096
        previousToken:
          type: string
          example: eyJlYXN0ZXIiOiJlZ2cifQ
          maxLength: 4096
    ProfileID:
      type: string
      pattern: "^mem_profile_[0-7][0-9a-z]{25}$"
      example: mem_profile_00000000000000000000000000
      description: The canonical profile ID.
    TraitValue:
      description: The value of a trait. Can be a string, integer, boolean, or an
        array of these types (arrays cannot contain nested arrays).
    FullTrait:
      type: object
      title: Full Trait
      description: Full metadata about a trait, beyond the name value pair.
      additionalProperties: false
      maxProperties: 4
      required:
      - name
      - traitGroup
      properties:
        name:
          type: string
          description: The name of the trait.
          example: firstName
          maxLength: 64
        value:
          "$ref": "#/components/schemas/TraitValue"
        traitGroup:
          type: string
          description: The trait group name to which this trait belongs.
          example: Contact
          maxLength: 64
        timestamp:
          type: string
          format: date-time
          description: The time the trait was created or last updated.
          example: '2025-01-01T12:00:00Z'
    TraitGroups:
      type: object
      description: Multiple trait groups.
      maxProperties: 50
      example:
        Contact:
          email: Alyssa.Mock@example.com
          phone: "+13175551234"
          lastName: Mock
          firstName: Alyssa
          street: 123 Main St
          city: San Francisco
          state: CA
          postalCode: '94107'
          country: US
      additionalProperties:
        x-additionalPropertiesName: TraitGroupPropertyName
        type: object
        description: Multiple traits.
        maxProperties: 99
        additionalProperties:
          description: The value of a trait. Can be a string, integer, boolean, or
            an array of these types (arrays cannot contain nested arrays).
    ProfileData:
      type: object
      description: Data for creating or updating a profile, including traits.
      additionalProperties: false
      properties:
        traits:
          "$ref": "#/components/schemas/TraitGroups"
    Profile:
      type: object
      additionalProperties: false
      properties:
        id:
          "$ref": "#/components/schemas/ProfileID"
        createdAt:
          type: string
          format: date-time
          description: The time the profile was created.
          example: '2025-01-01T12:00:00Z'
        traits:
          "$ref": "#/components/schemas/TraitGroups"
    ProfilePatch:
      type: object
      additionalProperties: false
      properties:
        traits:
          "$ref": "#/components/schemas/TraitGroups"
    ImportID:
      type: string
      pattern: "^mem_import_[0-7][0-9a-z]{25}$"
      example: mem_import_00000000000000000000000000
      description: The import operation ID.
    ColumnMappingItem:
      type: object
      additionalProperties: false
      description: Mapping of a CSV header column to the trait fields
      required:
      - columnName
      - traitGroup
      - traitName
      properties:
        columnName:
          type: string
          description: The name of the column in the CSV header
          example: first_name
          maxLength: 64
        traitGroup:
          type: string
          description: The trait group to which this trait belongs
          example: Contact
          maxLength: 64
        traitName:
          type: string
          description: The name of the trait in the trait group
          example: firstName
          maxLength: 64
      maxProperties: 3
    CommunicationLifecycleEvent:
      type: object
      description: A communication lifecycle event associated with a profile.
      properties:
        timestamp:
          type: string
          format: date-time
          description: The time the event occurred in ISO8601 format with millisecond
            resolution. Defaults to received time if not provided.
          example: '2025-01-01T12:00:00.000Z'
        lifecycle:
          type: string
          maxLength: 50
          description: The lifecycle event type of the communication.
          example: COMMUNICATION_SENT
        conversationId:
          type: string
          pattern: "^conv_conversation_[0-7][0-9a-z]{25}$"
          description: The unique identifier for the conversation.
          example: conv_conversation_00000000000000000000000000
        communicationId:
          type: string
          pattern: "^comms_communication_[0-7][0-9a-z]{25}$"
          description: The unique identifier for the communication.
          example: comms_communication_00000000000000000000000000
        communicationType:
          type: string
          maxLength: 20
          description: The communication channel type.
          example: SMS
        communicationStatus:
          type: string
          maxLength: 20
          description: The lifecycle status of the communication.
          example: SENT
        direction:
          type: string
          enum:
          - INBOUND
          - OUTBOUND
          description: The direction of the communication.
          example: OUTBOUND
        sender:
          type: object
          properties:
            address:
              type: string
              maxLength: 320
              description: The sender's address. Must be a valid address matching
                the channel type such as E.164 format for phone numbers.
              example: "+12345556789"
            participantId:
              type: string
              description: The unique identifier for the sender participant.
              pattern: "^comms_participant_[0-7][0-9a-z]{25}$"
              example: comms_participant_00000000000000000000000000
          required:
          - address
          - participantId
        recipient:
          type: object
          properties:
            address:
              type: string
              maxLength: 320
              description: The recipient's address. Must be a valid address matching
                the channel type such as E.164 format for phone numbers.
              example: "+13175557890"
            participantId:
              type: string
              description: The unique identifier for the recipient participant.
              pattern: "^comms_participant_[0-7][0-9a-z]{25}$"
              example: comms_participant_00000000000000000000000000
          required:
          - address
          - participantId
        errorCode:
          type: string
          maxLength: 10
          description: Error code for FAILED communication status.
          example: '30001'
        errorMessage:
          type: string
          maxLength: 512
          description: Error message for FAILED communication status.
          example: phone number is invalid
      required:
      - timestamp
      - communicationType
      - conversationId
      - lifecycle
    ProfileEventRequest:
      type: object
      description: Request body for adding events to a specific profile. This request
        can contain multiple events.
      properties:
        type:
          type: string
          enum:
          - twilio-communication-event
          - twilio-comms-lifecycle
          description: The type of event being sent.
          example: twilio-comms-lifecycle
        events:
          type: array
          maxItems: 1000
          items:
            oneOf:
            - "$ref": "#/components/schemas/CommunicationLifecycleEvent"
      required:
      - type
      - events
    StoreBase:
      type: object
      properties:
        displayName:
          type: string
          description: Provides a unique and addressable name to be assigned to this
            Store. This name is assigned by the developer and can be used in addition
            to the ID. It is intended to be human-readable and unique within the account.
          pattern: "^[a-zA-Z0-9-]+$"
          example: sandbox
        description:
          type: string
          description: A human readable description of this resource, up to 128 characters.
          minLength: 1
          maxLength: 128
          example: A testing ground for development, training, and experimentation
            without affecting live user data
      required:
      - displayName
    ServiceRequest:
      type: object
      additionalProperties: false
      allOf:
      - "$ref": "#/components/schemas/StoreBase"
    Store:
      type: object
      additionalProperties: false
      allOf:
      - "$ref": "#/components/schemas/StoreBase"
      - type: object
        properties:
          id:
            type: string
            description: The unique identifier for the Memory Store
            pattern: "^mem_(store|service)_[0-7][0-9a-z]{25}$"
            example: mem_store_00000000000000000000000000
          status:
            type: string
            description: The current status of the Memory Store.  A store begins in
              the QUEUED state as it is scheduled for processing.  It then moves to
              PROVISIONING at the beginning of processing. It transitions to ACTIVE
              once all dependent resources are provisioned, including Conversational
              Intelligence capabilities.  If there is an issue provisioning resources,
              the store will move to the FAILED state.
            enum:
            - QUEUED
            - PROVISIONING
            - ACTIVE
            - FAILED
            example: ACTIVE
          intelligenceServiceId:
            type: string
            maxLength: 64
            description: The ID of the associated intelligence service that was provisioned
              for memory extraction.
            example: intelligence_service_00000000000000000000000000
            nullable: true
          version:
            type: integer
            minimum: 1
            description: The current version number of the Memory Store. Incremented
              on each successful update.
            example: 3
        required:
        - id
        - status
        - intelligenceServiceId
        - version
    ServiceList:
      type: object
      additionalProperties: false
      properties:
        stores:
          type: array
          maxItems: 100
          items:
            type: string
            pattern: "^mem_(store|service)_[0-7][0-9a-z]{25}$"
          description: List of Memory Store IDs associated with the Twilio account.
          example:
          - mem_store_0123456789abcdefghijklmnop
          - mem_store_1123456789abcdefghijklmnop
          - mem_store_2123456789abcdefghijklmnop
          - mem_store_3123456789abcdefghijklmnop
        meta:
          "$ref": "#/components/schemas/Meta"
    IdentityResolutionSettingsCore:
      type: object
      description: Settings to define the list of identifier configs and how they
        are matched for new events (updates) against existing profiles to manage unique
        profiles within the Memory Store. It allows to customize the uniqueness, and
        allowed values of profile identifiers.
      properties:
        identifierConfigs:
          type: array
          minItems: 1
          maxItems: 15
          description: List of identifier, traits to use as identifiers for identity
            resolution.
          items:
            "$ref": "#/components/schemas/IdentifierConfig"
        matchingRules:
          type: array
          minItems: 1
          maxItems: 15
          description: List of rules to apply to match identifiers for new profile
            updates against existing profiles (if any). Rules are evaluated in the
            exact order specified in this array - the identity resolution algorithm
            will apply rules sequentially from first to last, and this order is preserved.
            If no rule matches against existing profiles, a new profile will be created.
            If a rule matches to a single existing profile, the profile will updated
            with the new data. If a rule matches to multiple existing profiles, those
            existing profiles will be merged into a single unique profile updated
            with the new data. All identifiers should match based on the matching
            condition (e.g. matchingAlgo) as per the identifierConfigs.
          items:
            type: string
            maxLength: 30
            description: Name of the identifier as defined in the identifierConfigs.
    IdentityResolutionSettings:
      type: object
      additionalProperties: false
      allOf:
      - "$ref": "#/components/schemas/IdentityResolutionSettingsCore"
      - type: object
        properties:
          version:
            type: integer
            minimum: 1
            description: The current version number of the Identity Resolution Settings.
              Incremented on each successful update.
            example: 3
        required:
        - version
    IdentifierConfig:
      type: object
      additionalProperties: false
      required:
      - idType
      - matchingAlgo
      - limit
      - limitPolicy
      - enforceUnique
      - normalization
      properties:
        idType:
          type: string
          description: Name of the identifier to use for identity resolution. Usual
            values are email, phone, user_id etc.
          example: email
          minLength: 2
          maxLength: 30
        matchingAlgo:
          type: string
          description: The algorithm to use for matching the identifier's value. Possible
            value are exact or fuzzy Exact will match the identifier exactly, while
            fuzzy (low precision) will allow for some variations.
          enum:
          - exact
          - fuzzy
        matchingThreshold:
          type: integer
          description: The threshold as percentage to use for fuzzy matching. A value
            between 50 and 99. Required for fuzzy algo.
          minimum: 50
          maximum: 99
        limit:
          type: integer
          description: Maximum number of value to retain for this identifier for a
            profile.
          minimum: 1
          maximum: 100
        limitPolicy:
          type: string
          enum:
          - lifo
          - fifo
          description: Policy to apply when the number of values  for the identifier
            exceeds the limit. The extra values will be removed using either fifo
            or lifo policy to make them compliant. fifo/lifo will be applied based
            on the event timestamp of the request that added the identifier.
          example: lifo
        enforceUnique:
          type: boolean
          description: True means only one profile will have the identifier, forcing
            profiles that share it to merge. False would allow multiple profiles to
            share the identifier and only merge if there is a matching MatchingRule.
        normalization:
          type: string
          enum:
          - phone
          - email
          - trim
          - none
          description: Normalization to apply to the identifier value before storing
            and matching.
          example: phone
    TraitGroupCore:
      type: object
      description: A Trait Group is a collection of related traits belonging to a
        domain managed by an owner. Traits are attributes or characteristics of a
        profile, such as age, location, or preferences. This API allows for the creation,
        retrieval, updating, and deletion of Trait Groups and their associated traits.
      properties:
        displayName:
          type: string
          description: Provides a unique and addressable name to be assigned to this
            Trait Group
          minLength: 1
          maxLength: 64
          pattern: "^[a-zA-Z0-9_\\-\\.]+$"
          example: Contact
        description:
          type: string
          maxLength: 1024
          description: description of the Trait Group
          example: This Trait Group contains traits related to contact information.
        traits:
          type: object
          description: Map of traits that are part of this Trait Group, where the
            key is the trait name and the value is the trait's definition.
          additionalProperties:
            type: object
            additionalProperties: false
            description: A Trait is a single attribute or characteristic of a profile,
              such as age, location, or preferences.
            properties:
              displayName:
                type: string
                description: |-
                  Display name of the Trait, which is unique within the Trait Group. Trait names are normalized to lowerCamelCase
                  naming conventions and can include letters, numbers, underscores, hyphens, and periods. They must start with a
                  letter.
                minLength: 1
                maxLength: 128
                pattern: "^[a-z][a-zA-Z0-9_\\-\\.]*$"
                example: email
              dataType:
                type: string
                description: |-
                  Data type of the Trait, such as STRING, NUMBER, BOOLEAN, ARRAY.
                  For DELETE operations in PATCH requests, set this to an empty string ("") to mark the trait for deletion.
                example: STRING
                enum:
                - STRING
                - NUMBER
                - BOOLEAN
                - ARRAY
                - ''
              description:
                type: string
                maxLength: 1024
                description: Description of the Trait, providing additional context
                  or information.
                example: The user's primary email address
              validationRule:
                "$ref": "#/components/schemas/ValidationRule"
              idTypePromotion:
                type: string
                maxLength: 30
                description: |-
                  The name of the identifier type to promote the trait value to, such as ''email'', ''phone'', ''user_id'',
                  etc. This allows the trait to be mapped to an identifier in Identity Resolution. The identifier type should be
                  configured in the Identity Resolution Settings.
                example: email
            required:
            - dataType
          maxProperties: 95
          example:
            email:
              displayName: email
              dataType: STRING
              description: User's email address
            dob:
              displayName: dob
              dataType: STRING
              description: User's date of birth
      required:
      - displayName
    TraitGroup:
      type: object
      additionalProperties: false
      allOf:
      - "$ref": "#/components/schemas/TraitGroupCore"
      - type: object
        properties:
          version:
            type: integer
            minimum: 1
            description: The current version number of the Trait Group. Incremented
              on each successful update.
            example: 3
        required:
        - version
    TraitGroupRequest:
      type: object
      additionalProperties: false
      description: Payload schema for creating Trait Groups.
      properties:
        displayName:
          type: string
          description: Unique name of the Trait Group
          minLength: 1
          maxLength: 64
          pattern: "^[a-zA-Z0-9_\\-\\.]+$"
          example: Contact
        description:
          type: string
          maxLength: 1024
          description: description of the Trait Group
          example: This Trait Group contains traits related to contact information.
        traits:
          type: object
          description: Map of traits belonging to this Trait Group, keyed by trait
            name.
          additionalProperties:
            type: object
            additionalProperties: false
            description: A Trait is a single attribute or characteristic of a profile,
              such as age, location, or preferences.
            properties:
              displayName:
                type: string
                description: |-
                  Display name of the Trait, which is unique within the Trait Group. Trait names are normalized to lowerCamelCase
                  naming conventions and can include letters, numbers, underscores, hyphens, and periods. They must start with a
                  letter.
                minLength: 1
                maxLength: 128
                pattern: "^[a-z][a-zA-Z0-9_\\-\\.]*$"
                example: email
              dataType:
                type: string
                description: |-
                  Data type of the Trait, such as STRING, NUMBER, BOOLEAN, ARRAY.
                  For DELETE operations in PATCH requests, set this to an empty string ("") to mark the trait for deletion.
                example: STRING
                enum:
                - STRING
                - NUMBER
                - BOOLEAN
                - ARRAY
                - ''
              description:
                type: string
                maxLength: 1024
                description: Description of the Trait, providing additional context
                  or information.
                example: The user's primary email address
              validationRule:
                "$ref": "#/components/schemas/ValidationRule"
              idTypePromotion:
                type: string
                maxLength: 30
                description: |-
                  The name of the identifier type to promote the trait value to, such as ''email'', ''phone'', ''user_id'',
                  etc. This allows the trait to be mapped to an identifier in Identity Resolution. The identifier type should be
                  configured in the Identity Resolution Settings.
                example: email
            required:
            - dataType
          maxProperties: 95
          example:
            email:
              displayName: email
              dataType: STRING
              description: User's email address
            dob:
              displayName: dob
              dataType: STRING
              description: User's date of birth
      required:
      - displayName
    TraitDefinition:
      type: object
      additionalProperties: false
      description: A Trait is a single attribute or characteristic of a profile, such
        as age, location, or preferences.
      properties:
        displayName:
          type: string
          description: |-
            Display name of the Trait, which is unique within the Trait Group. Trait names are normalized to lowerCamelCase
            naming conventions and can include letters, numbers, underscores, hyphens, and periods. They must start with a
            letter.
          minLength: 1
          maxLength: 128
          pattern: "^[a-z][a-zA-Z0-9_\\-\\.]*$"
          example: email
        dataType:
          type: string
          description: |-
            Data type of the Trait, such as STRING, NUMBER, BOOLEAN, ARRAY.
            For DELETE operations in PATCH requests, set this to an empty string ("") to mark the trait for deletion.
          example: STRING
          enum:
          - STRING
          - NUMBER
          - BOOLEAN
          - ARRAY
          - ''
        description:
          type: string
          maxLength: 1024
          description: Description of the Trait, providing additional context or information.
          example: The user's primary email address
        idTypePromotion:
          type: string
          maxLength: 30
          description: |-
            The name of the identifier type to promote the trait value to, such as ''email'', ''phone'', ''user_id'',
            etc. This allows the trait to be mapped to an identifier in Identity Resolution. The identifier type should be
            configured in the Identity Resolution Settings.
          example: email
      required:
      - dataType
    ValidationRule:
      oneOf:
      - "$ref": "#/components/schemas/StringValidationRule"
      - "$ref": "#/components/schemas/NumberValidationRule"
      - "$ref": "#/components/schemas/BooleanValidationRule"
      - "$ref": "#/components/schemas/ArrayValidationRule"
      discriminator:
        propertyName: ruleType
        mapping:
          STRING: "#/components/schemas/StringValidationRule"
          NUMBER: "#/components/schemas/NumberValidationRule"
          BOOLEAN: "#/components/schemas/BooleanValidationRule"
          ARRAY: "#/components/schemas/ArrayValidationRule"
    StringValidationRule:
      type: object
      description: Validation for string dataType.
      properties:
        pattern:
          type: string
          description: Regex pattern (max 1000 chars)
          maxLength: 1000
        minLength:
          type: integer
          description: Minimum string length
          minimum: 0
        maxLength:
          type: integer
          description: Maximum string length
          minimum: 1
        ruleType:
          type: string
          description: Discriminator field indicating this is a string validation
            rule.
          enum:
          - STRING
      additionalProperties: false
      required:
      - ruleType
    NumberValidationRule:
      type: object
      description: Validation for number dataType.
      properties:
        min:
          type: number
          description: Minimum value
        max:
          type: number
          description: Maximum value
        ruleType:
          type: string
          description: Discriminator field indicating this is a number validation
            rule.
          enum:
          - NUMBER
      additionalProperties: false
      required:
      - ruleType
    BooleanValidationRule:
      type: object
      description: Validation for boolean dataType (no extra properties)
      additionalProperties: false
      properties:
        ruleType:
          type: string
          description: Discriminator field indicating this is a boolean validation
            rule.
          enum:
          - BOOLEAN
      required:
      - ruleType
    ArrayValidationRule:
      type: object
      description: Validation for array dataType.
      properties:
        minItems:
          type: integer
          description: Minimum number of items
          minimum: 0
        maxItems:
          type: integer
          description: Maximum number of items
          minimum: 0
        ruleType:
          type: string
          description: Discriminator field indicating this is an array validation
            rule.
          enum:
          - ARRAY
      additionalProperties: false
      required:
      - ruleType
    Meta:
      type: object
      additionalProperties: false
      properties:
        key:
          type: string
          nullable: false
          maxLength: 64
          description: |
            The key of the list property contains the actual data items.
            This enables programmatic iteration over paginated results.
          example: stores
        pageSize:
          type: integer
          default: 50
        nextToken:
          type: string
          maxLength: 4096
          example: eyJlYXN0ZXIiOiJlZ2cifQ
        previousToken:
          type: string
          maxLength: 4096
          example: eyJlYXN0ZXIiOiJlZ2cifQ
    DataMappingType:
      type: string
      description: The type of data mapping defining how data flows into the Memory
        Store.
      enum:
      - DATASET
      default: DATASET
      example: DATASET
    DataMappingFromTypes:
      type: object
      description: |-
        Details of where to map data items from. Each data mapping from type has its own set of configuration
        parameters and source specific properties.
      oneOf:
      - "$ref": "#/components/schemas/DataMappingFromDataSet"
      discriminator:
        propertyName: type
        mapping:
          DATASET: "#/components/schemas/DataMappingFromDataSet"
      example:
        type: DATASET
        datasetId: tdi_dataset_00000000000000000000000000
    DataMappingFromDataSet:
      type: object
      additionalProperties: false
      description: Configuration for mapping from a TDI dataset.
      properties:
        type:
          type: string
          description: The source data type, which determines the source of the data
            and the required configuration parameters.
          enum:
          - DATASET
          default: DATASET
          example: DATASET
        datasetId:
          type: string
          description: The unique identifier of the TDI dataset to connect.
          pattern: "^tdi_dataset_[0-7][0-9a-z]{25}$"
          example: tdi_dataset_00000000000000000000000000
      required:
      - type
      - datasetId
    DataMappingToTypes:
      type: object
      description: |-
        Details of where to map data items to. Each data mapping to type has its own set of configuration
        parameters and destination specific properties.
      oneOf:
      - "$ref": "#/components/schemas/DataMappingToTraits"
      discriminator:
        propertyName: type
        mapping:
          TRAITS: "#/components/schemas/DataMappingToTraits"
      example:
        type: TRAITS
        mappings:
        - fieldName: primary_email
          traitGroup: Contact
          traitName: email
    DataMappingToTraits:
      type: object
      additionalProperties: false
      description: Configuration for mapping data to traits in a Memory Store.
      properties:
        type:
          type: string
          description: The destination data type, which determines where to write
            the data and the required configuration parameters.
          enum:
          - TRAITS
          default: TRAITS
          example: TRAITS
        mappings:
          type: array
          description: The list of field to trait mappings.
          minItems: 1
          maxItems: 100
          items:
            "$ref": "#/components/schemas/MappingTraitItem"
      required:
      - type
      - mappings
    MappingTraitItem:
      type: object
      additionalProperties: false
      description: Maps a field from a source to a Trait in the Memory Store.
      properties:
        fieldName:
          type: string
          description: The name of the field/column in the source.
          minLength: 1
          maxLength: 64
          example: primary_email
        traitGroup:
          type: string
          description: The name of the Trait Group to map to.
          minLength: 1
          maxLength: 64
          pattern: "^[a-zA-Z0-9_\\-\\.]+$"
          example: Contact
        traitName:
          type: string
          description: The name of the trait within the Trait Group to map to.
          minLength: 1
          maxLength: 128
          pattern: "^[a-z][a-zA-Z0-9_\\-\\.]*$"
          example: email
      required:
      - fieldName
      - traitGroup
      - traitName
    DataMappingName:
      type: string
      description: Name of the data mapping.
      pattern: "^[a-zA-Z][a-zA-Z0-9-_.]*$"
      minLength: 1
      maxLength: 128
      example: crm-contacts
    DataMappingCore:
      type: object
      description: |-
        Writable fields of a data mapping. Used directly as the PATCH request body
        (all fields optional). Composed into CreateDataMappingInput via allOf.
      properties:
        displayName:
          "$ref": "#/components/schemas/DataMappingName"
        description:
          type: string
          description: A human readable description of this resource, up to 512 characters.
          minLength: 1
          maxLength: 512
          example: Syncs customer data from CRM dataset to profile traits
        isEnabled:
          type: boolean
          description: |-
            Flag indicating whether the data mapping is active. When true, data will be
            ingested and mapped according to the configuration. When false, the data mapping
            will be inactive and no data will be ingested into the Memory Store.
          default: true
          example: true
        mappingTo:
          "$ref": "#/components/schemas/DataMappingToTypes"
    CreateDataMappingInput:
      type: object
      description: |-
        A data mapping connects external data sources to a Memory Store, enabling automatic
        ingestion and mapping of data to profile traits.
      allOf:
      - "$ref": "#/components/schemas/DataMappingCore"
      - type: object
        properties:
          displayName:
            "$ref": "#/components/schemas/DataMappingName"
          mappingFrom:
            "$ref": "#/components/schemas/DataMappingFromTypes"
          mappingTo:
            "$ref": "#/components/schemas/DataMappingToTypes"
        required:
        - displayName
        - mappingFrom
        - mappingTo
    DataMapping:
      type: object
      additionalProperties: false
      allOf:
      - "$ref": "#/components/schemas/CreateDataMappingInput"
      - type: object
        properties:
          id:
            type: string
            description: The unique identifier for the data mapping.
            pattern: "^mem_datamapping_[0-7][0-9a-z]{25}$"
            example: mem_datamapping_00000000000000000000000000
          createdAt:
            type: string
            format: date-time
            description: The ISO 8601 timestamp when the  data mapping was created.
            example: '2026-01-15T10:30:00Z'
          updatedAt:
            type: string
            format: date-time
            description: The ISO 8601 timestamp when the data mapping was last updated.
            example: '2026-01-15T11:45:00Z'
          version:
            type: integer
            minimum: 1
            description: The current version number of the DataMapping. Incremented
              on each successful update.
            example: 3
        required:
        - id
        - createdAt
        - updatedAt
        - version
    DataMappingList:
      type: object
      additionalProperties: false
      properties:
        dataMappings:
          type: array
          maxItems: 100
          items:
            "$ref": "#/components/schemas/DataMapping"
          description: List of DataMappings associated with the Memory Store.
        meta:
          "$ref": "#/components/schemas/Meta"
    RecallObservationInfo:
      type: object
      description: A transient and mutable observation memory associated with a profile.
    RecallSummaryInfo:
      type: object
      description: A summary memory derived from conversations.
    SummaryCorePatch:
      type: object
      description: Core mutable properties for updating summary objects. All fields
        are optional for PATCH operations.
      properties:
        source:
          type: string
          description: The source system that generated the summary. Allows letters,
            numbers, spaces, and URL-safe symbols. Excludes URL-unsafe characters
            like quotes, angle brackets, and control characters.
          maxLength: 100
          pattern: "^[a-zA-Z0-9 _.-]+$"
          example: conversations
        content:
          type: string
          description: The main content of the summary.
          minLength: 1
          maxLength: 4096
          example: Customer discussed billing concerns and was satisfied with the
            resolution provided during this conversation.
        occurredAt:
          type: string
          format: date-time
          description: The timestamp when the summary was originally created. If not
            provided, defaults to the time the summary was received.
          example: '2025-01-15T10:15:30Z'
        conversationId:
          "$ref": "#/components/schemas/ConversationID"
  parameters:
    PageSize:
      name: pageSize
      in: query
      required: false
      description: The maximum number of items to return per page, maximum of 1000.
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 1000
    PageToken:
      name: pageToken
      in: query
      required: false
      description: The token for the page of results to retrieve.
      schema:
        type: string
        maxLength: 500
    ImportId:
      name: importId
      in: path
      description: The task identifier for the import process.
      required: true
      schema:
        type: string
        pattern: "^mem_import_[0-7][0-9a-z]{25}$"
    StoreId:
      name: storeId
      in: path
      required: true
      description: A unique Memory Store ID using Twilio Type ID (TTID) format
      schema:
        type: string
        pattern: "^mem_(store|service)_[0-7][0-9a-z]{25}$"
        example: mem_store_00000000000000000000000000
    ProfileId:
      name: profileId
      in: path
      required: true
      description: The unique identifier for the profile using Twilio Type ID (TTID)
        format.
      schema:
        type: string
        pattern: "^mem_profile_[0-7][0-9a-z]{25}$"
        example: mem_profile_00000000000000000000000000
    IdentifierType:
      name: idType
      in: path
      required: true
      description: Identifier type configured for the service (for example `email`,
        `phone`, or `externalId`).
      schema:
        type: string
        minLength: 2
        maxLength: 30
        example: email
    AcceptEncoding:
      name: Accept-Encoding
      in: header
      required: false
      description: Compression algorithms supported by the client (e.g., gzip, deflate,
        br)
      schema:
        type: string
        maxLength: 200
        pattern: "^[a-zA-Z0-9, .-]*$"
        example: gzip, deflate, br
    ContentEncoding:
      name: Content-Encoding
      in: header
      required: false
      description: Compression algorithm used for the request body (e.g., gzip, deflate,
        br)
      schema:
        type: string
        enum:
        - gzip
        - deflate
        - br
        - compress
        example: gzip
    ObservationId:
      name: observationId
      in: path
      description: The observation ID.
      required: true
      schema:
        "$ref": "#/components/schemas/ObservationID"
    SummaryId:
      name: summaryId
      in: path
      description: The summary ID.
      required: true
      schema:
        "$ref": "#/components/schemas/SummaryID"
    SourceParam:
      name: source
      in: query
      required: false
      description: Filter by source. Allows letters, numbers, spaces, and URL-safe
        symbols. Excludes URL-unsafe characters like quotes, angle brackets, and control
        characters.
      schema:
        type: string
        minLength: 1
        maxLength: 100
        pattern: "^[a-zA-Z0-9 _.-]+$"
        example: customer service platform
    CreatedAfter:
      name: createdAfter
      in: query
      description: Filter observations created after this timestamp (inclusive).
      required: false
      schema:
        type: string
        format: date-time
        example: '2025-01-01T00:00:00Z'
    CreatedBefore:
      name: createdBefore
      in: query
      description: Filter observations created before this timestamp (exclusive).
      required: false
      schema:
        type: string
        format: date-time
        example: '2025-01-31T23:59:59Z'
    OrderBy:
      name: orderBy
      in: query
      required: false
      description: Either 'ASC' or 'DESC' to sort results ascending or descending
        respectively.
      schema:
        type: string
        enum:
        - ASC
        - DESC
        default: DESC
    TraitGroupsQueryParam:
      name: traitGroups
      in: query
      required: false
      description: Comma separated list of trait group names to include.
      schema:
        type: string
        minLength: 1
        maxLength: 256
        example: Contact
    ControlPlanePageSize:
      name: pageSize
      in: query
      required: false
      description: The maximum number of items to return per page, maximum of 100.
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 100
    IfMatchHeader:
      in: header
      name: If-Match
      description: "Allows for optimistic concurrency control by making the request
        conditional.\nServer will only act if the resource's current Entity Tag (ETag)
        matches\none provided, preventing accidental overwrites and responding with
        412\nPrecondition Failed if they don't match. "
      schema:
        type: string
        maxLength: 100
        example: '"eyJpZCI6ImFuX2lkIiwidiI6MX0"'
    PreferHeader:
      in: header
      name: Prefer
      description: "Allows specifying a preference for waiting for completion of the
        operation before responding.\nSet **respond-async; wait=X**, where **X** is
        the number of seconds for the server \nto wait. The operation will return
        a 2xx success code if it completes within the specified\nwait time, otherwise
        a 202 Accepted is returned and processing continues asynchronously."
      required: false
      schema:
        type: string
        pattern: "^respond-async,\\s*wait=\\d+$"
        example: respond-async, wait=30
    traitGroupName:
      name: traitGroupName
      in: path
      required: true
      description: A unique Name of the TraitGroup
      schema:
        type: string
        minLength: 1
        maxLength: 64
        example: Contact
    DataMappingId:
      name: dataMappingId
      in: path
      required: true
      description: A unique DataMapping ID using Twilio Type ID (TTID) format
      schema:
        type: string
        pattern: "^mem_datamapping_[0-7][0-9a-z]{25}$"
        example: mem_datamapping_00000000000000000000000000
