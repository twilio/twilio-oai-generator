            message: Conflict
            more_info: https://www.twilio.com/docs/api/errors/20409
            status: 409
  headers:
    ETag:
      description: 'Entity tag that acts as a unique identifier for a specific version
        of the resource.

        Send updates with If-Match conditional headers for optimistic concurrency
