          schema:
            type: string
            pattern: ^[0-9]+$
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TwilioError'
          example:
            code: 20500
            message: Internal Server Error
            more_info: https://www.twilio.com/docs/api/errors/20500
            status: 500
    ServiceUnavailable:
      description: Service Unavailable
      content:
        application/json:
          schema:
