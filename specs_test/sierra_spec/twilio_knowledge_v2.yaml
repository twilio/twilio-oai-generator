        type: string
        maxLength: 500
    KnowledgeIdPath:
      name: knowledgeId
      in: path
      required: true
      description: A unique Knowledge resource ID using Twilio Type ID (TTID) format
      schema:
        type: string
        pattern: ^know_knowledge_[0-7][0-9a-z]{25}$
        example: know_knowledge_00000000000000000000000000
    ControlPlanePageSize:
      name: pageSize
      in: query
      required: false
      description: The maximum number of items to return per page, maximum of 100.
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 100
    OrderBy:
      name: orderBy
      in: query
      required: false
      description: Either 'ASC' or 'DESC' to sort results ascending or descending
        respectively.
      schema:
        type: string
        enum:
        - ASC
        - DESC
        default: DESC
    IfMatchHeader:
      in: header
      name: If-Match
      description: 'Allows for optimistic concurrency control by making the request
        conditional.

        Server will only act if the resource''s current Entity Tag (ETag) matches

        one provided, preventing accidental overwrites and responding with 412

        Precondition Failed if they don''t match. '
      schema:
        type: string
        maxLength: 100
        example: '"eyJpZCI6ImFuX2lkIiwidiI6MX0"'
    PreferHeader:
      in: header
      name: Prefer
      description: "Allows specifying a preference for waiting for completion of the\
        \ operation before responding.\nSet **respond-async; wait=X**, where **X**\
        \ is the number of seconds for the server \nto wait. The operation will return\
        \ a 2xx success code if it completes within the specified\nwait time, otherwise\
        \ a 202 Accepted is returned and processing continues asynchronously."
      required: false
      schema:
        type: string
        pattern: ^respond-async,\s*wait=\d+$
        example: respond-async, wait=30
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TwilioError'
          example:
            code: 400
            message: Failed to complete request due to a bad request
            more_info: https://www.twilio.com/docs/api/errors/400
            status: 400
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
