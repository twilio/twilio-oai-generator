openapi: 3.0.1
servers:
- url: https://conversations.twilio.com
info:
  title: Maestro (Conversations)
  description: Manage configurations, conversations, participants, and communications.
    Create configurations to define capture rules and channel settings, then use conversations
    to group related communications.
  version: 2.0.0
  x-twilio:
    apiStandards: v1.0
components:
  securitySchemes:
    basic_apikey_or_accountsid:
      scheme: basic
      type: http
      description: This API uses [basic authentication](https://www.twilio.com/docs/glossary/what-is-basic-authentication).
        Use an [API key](https://www.twilio.com/docs/iam/api-keys) as the username
        and the API key secret as the password. You can also use your account SID
        and auth token, but limit their use to local testing.
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                description: Twilio-specific error code
                type: integer
                format: int32
              message:
                description: Error message
                type: string
              more_info:
                description: Link to Error Code References
                type: string
              status:
                description: HTTP response status code
                type: integer
                format: int32
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                description: Twilio-specific error code
                type: integer
                format: int32
              message:
                description: Error message
                type: string
              more_info:
                description: Link to Error Code References
                type: string
              status:
                description: HTTP response status code
                type: integer
                format: int32
    TooManyRequests:
      description: Too Many Requests
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                description: Twilio-specific error code
                type: integer
                format: int32
              message:
                description: Error message
                type: string
              more_info:
                description: Link to Error Code References
                type: string
              status:
                description: HTTP response status code
                type: integer
                format: int32
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                description: Twilio-specific error code
                type: integer
                format: int32
              message:
                description: Error message
                type: string
              more_info:
                description: Link to Error Code References
                type: string
              status:
                description: HTTP response status code
                type: integer
                format: int32
    ServiceUnavailable:
      description: Service Unavailable
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                description: Twilio-specific error code
                type: integer
                format: int32
              message:
                description: Error message
                type: string
              more_info:
                description: Link to Error Code References
                type: string
              status:
                description: HTTP response status code
                type: integer
                format: int32
  schemas:
    conversations.v2.conversation:
      type: object
      required:
      - id
      - accountId
      - configurationId
      properties:
        id:
          type: string
          description: Conversation ID.
          example: conv_conversation_01k1etk2y5f1y9fpe2epfdtvv2
        accountId:
          type: string
          description: Account ID.
          example: ACaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        configurationId:
          type: string
          description: Configuration ID.
          example: conv_configuration_01k1etk2y5f1y9fpe2epfdtvv2
        status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - CLOSED
          description: Conversation status.
          example: ACTIVE
        name:
          type: string
          description: Conversation name.
          example: Customer Support Chat
          nullable: true
        createdAt:
          type: string
          format: date-time
          description: Timestamp when this Conversation was created.
          example: '2023-07-01T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when this Conversation was last updated.
          example: '2023-07-01T12:30:00Z'
        configuration:
          type: object
          description: Full configuration settings for this Conversation.
          properties:
            displayName:
              type: string
              description: A human-readable name for the configuration. Limited to
                32 characters.
              maxLength: 32
              pattern: ^[a-zA-Z0-9-_ ]+$
              example: My Support Config
            description:
              type: string
              description: Human-readable description for the Configuration.
              example: Customer Support Configuration for handling all inbound customer
                inquiries
            conversationGroupingType:
              type: string
              enum:
              - GROUP_BY_PARTICIPANT_ADDRESSES
              - GROUP_BY_PARTICIPANT_ADDRESSES_AND_CHANNEL_TYPE
              description: "Type of Conversation grouping strategy:\n- `GROUP_BY_PARTICIPANT_ADDRESSES`:\
                \ Groups Communications by Participant addresses across all channels.\n\
                \  A customer using +18005550100 will be in the same Conversation\
                \ whether they contact by SMS, WhatsApp, or RCS.\n- `GROUP_BY_PARTICIPANT_ADDRESSES_AND_CHANNEL_TYPE`:\
                \ Groups Communications by both Participant addresses AND channel.\n\
                \  A customer using +18005550100 by SMS will be in a different Conversation\
                \ than the same customer by Voice.\n"
              example: GROUP_BY_PARTICIPANT_ADDRESSES
            memoryStoreId:
              type: string
              description: Memory Store ID for Profile resolution.
              example: mem_store_01k1etk2y5f1y9fpe2epfdtvv2
            channelSettings:
              $ref: '#/components/schemas/conversations.v2.channel_settings'
              description: Channel-specific configuration settings including timeout
                settings and capture rules.
            statusCallbacks:
              type: array
              description: List of default webhook configurations applied to Conversations
                under this Configuration.
              maxItems: 20
              items:
                $ref: '#/components/schemas/conversations.v2.status_callback_config'
            intelligenceConfigurationIds:
              type: array
              description: List of Intelligence Configuration IDs configured for this
                Configuration.
              items:
                type: string
              example:
              - agent1
              - agent2
      example:
        id: conv_conversation_01k1etk2y5f1y9fpe2epfdtvv2
        accountId: ACaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        configurationId: conv_configuration_01k1etk2y5f1y9fpe2epfdtvv2
        status: ACTIVE
        name: Customer Support - Multi-channel
        createdAt: '2023-07-01T12:00:00Z'
        updatedAt: '2023-07-01T12:30:00Z'
    conversations.v2.participant:
      type: object
      required:
      - id
      - conversationId
      - accountId
      - name
      properties:
        id:
          type: string
          description: Participant ID.
          example: conv_participant_01k1etx3jbfx88476ccja0889c
        conversationId:
          type: string
          description: Conversation ID.
          example: conv_conversation_01k1etk2y5f1y9fpe2epfdtvv2
        accountId:
          type: string
          description: Account ID.
          example: ACaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        name:
          type: string
          description: Participant display name.
          example: Dana S.
        type:
          type: string
          enum:
          - HUMAN_AGENT
          - CUSTOMER
          - AI_AGENT
          description: Type of Participant in the Conversation.
          example: CUSTOMER
        profileId:
          type: string
          description: 'Profile ID. Note: This field is only resolved for `CUSTOMER`
            participant types, not for `HUMAN_AGENT` or `AI_AGENT` participants.'
          example: mem_profile_00000000000000000000000000
        addresses:
          type: array
          description: 'Communication addresses for this Participant. Address format
            varies by channel:

            - SMS/VOICE: E.164 phone number (such as "+18005550100")

            - EMAIL: Email address (such as "user@example.com")

            - WHATSAPP: Phone number with whatsapp prefix (such as "whatsapp:+18005550100")

            - RCS: Sender ID or phone number with rcs prefix (such as "rcs:brand_acme_agent"
            or "rcs:+18005550100")

            '
          items:
            $ref: '#/components/schemas/conversations.v2.address'
        createdAt:
          type: string
          format: date-time
          description: Timestamp when this Participant was created.
          example: '2023-07-01T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when this Participant was last updated.
          example: '2023-07-01T12:00:00Z'
      example:
        id: conv_participant_01k1etx3jbfx88476ccja0889c
        conversationId: conv_conversation_01k1etk2y5f1y9fpe2epfdtvv2
        accountId: ACaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        name: Dana
        type: CUSTOMER
        profileId: mem_profile_00000000000000000000000000
        addresses:
        - channel: SMS
          address: '+18005550100'
        - channel: WHATSAPP
          address: whatsapp:+18005550100
        - channel: RCS
          address: rcs:+18005550100
        createdAt: '2023-07-01T12:00:00Z'
        updatedAt: '2023-07-01T12:30:00Z'
    conversations.v2.address:
      type: object
      required:
      - channel
      - address
      properties:
        channel:
          type: string
          enum:
          - VOICE
          - SMS
          - RCS
          - WHATSAPP
          - CHAT
          description: The channel for Communication.
          example: SMS
        address:
          type: string
          description: 'The address value formatted according to channel type:

            - SMS/VOICE: E.164 phone number (such as "+18005550100")

            - WHATSAPP: Phone number with whatsapp prefix (such as "whatsapp:+18005550100")

            - RCS: Sender ID or phone number with rcs prefix (such as "rcs:brand_acme_agent"
            or "rcs:+18005550100")

            - CHAT: Customer-defined string identifier

            '
          example: '+18005550100'
        channelId:
          type: string
          description: Channel-specific ID for correlating Communications.
          example: SM12345678901234567890123456789012
      example:
        channel: SMS
        address: '+18005550100'
    conversations.v2.communication:
      type: object
      required:
      - id
      - conversationId
      - accountId
      - author
      - content
      - recipients
      properties:
        id:
          type: string
          description: Communication ID.
          example: conv_communication_01k1etk2y5f1y9fpe2epfdtvv2
        conversationId:
          type: string
          description: Conversation ID.
          example: conv_conversation_01k1etk2y5f1y9fpe2epfdtvv2
        accountId:
          type: string
          description: Account ID.
          example: ACaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        author:
          $ref: '#/components/schemas/conversations.v2.participant_address'
        content:
          description: The content of the Communication using type field for discrimination.
          oneOf:
          - $ref: '#/components/schemas/conversations.v2.content_text'
          - $ref: '#/components/schemas/conversations.v2.content_transcription'
        channelId:
          type: string
          description: Channel-specific reference ID.
          example: CA123456789
        recipients:
          type: array
          description: Communication recipients.
          items:
            allOf:
            - $ref: '#/components/schemas/conversations.v2.participant_address'
            - type: object
              properties:
                deliveryStatus:
                  type: string
                  description: Delivery status of the Communication to this recipient.
                  enum:
                  - INITIATED
                  - IN_PROGRESS
                  - DELIVERED
                  - COMPLETED
                  - FAILED
        createdAt:
          type: string
          format: date-time
          description: Timestamp when this Communication was created.
          example: '2023-07-01T12:15:00Z'
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when this Communication was last updated.
          example: '2023-07-01T12:15:00Z'
      example:
        id: conv_communication_01k1etk2y5f1y9fpe2epfdtvv2
        conversationId: conv_conversation_01k1etk2y5f1y9fpe2epfdtvv2
        accountId: ACaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        author:
          address: '+18005550100'
          channel: SMS
          participantId: conv_participant_01k1etx3jbfx88476ccja0889c
        content:
          type: TEXT
          text: Hello, I need help with my order
        channelId: SM12345678901234567890123456789012
        recipients:
        - address: '+18005550102'
          channel: SMS
          participantId: conv_participant_02m2fuy4lcgy99587ddkb1990d
          deliveryStatus: DELIVERED
        createdAt: '2023-07-01T12:15:00Z'
        updatedAt: '2023-07-01T12:15:05Z'
    conversations.v2.participant_address:
      type: object
      required:
      - address
      - channel
      properties:
        address:
          type: string
          description: 'The address value formatted according to channel type:

            - SMS/VOICE: E.164 phone number (such as "+18005550100")

            - WHATSAPP: Phone number with whatsapp prefix (such as "whatsapp:+18005550100")

            - RCS: Sender ID or phone number with rcs prefix (such as "rcs:brand_acme_agent"
            or "rcs:+18005550100")

            - CHAT: Customer-defined string identifier

            '
          example: '+18005550100'
        channel:
          type: string
          enum:
          - VOICE
          - SMS
          - RCS
          - WHATSAPP
          - CHAT
          description: Channel type for the Participant address.
          example: SMS
        participantId:
          type: string
          description: Participant ID associated with this address.
          example: conv_participant_01k1etx3jbfx88476ccja0889c
      example:
        address: '+18005550100'
        channel: SMS
        participantId: conv_participant_01k1etx3jbfx88476ccja0889c
    conversations.v2.content_text:
      title: ContentText
      type: object
      required:
      - type
      - text
      properties:
        type:
          type: string
          enum:
          - TEXT
          description: Content type discriminator.
          example: TEXT
        text:
          type: string
          description: Message text content.
          example: Hello, how can I help you today?
      example:
        type: TEXT
        text: 'Hello, I need help with my order #12345'
    conversations.v2.content_transcription:
      title: ContentTranscription
      type: object
      required:
      - type
      - text
      properties:
        type:
          type: string
          enum:
          - TRANSCRIPTION
          description: Content type discriminator.
          example: TRANSCRIPTION
        text:
          type: string
          description: Transcribed text.
          example: Hello, how can I help you today?
        transcription:
          type: object
          description: Transcription metadata.
          properties:
            channel:
              type: integer
              description: Audio channel identifier (0 for inbound, 1 for outbound).
              example: 0
            confidence:
              type: number
              format: float
              minimum: 0.0
              maximum: 1.0
              description: Overall confidence score for the transcription (0.0-1.0).
              example: 0.95
            engine:
              type: string
              description: Transcription engine used.
              example: twilio
            words:
              type: array
              description: Word-level transcription data with timing information.
              items:
                type: object
                required:
                - text
                properties:
                  text:
                    type: string
                    description: The transcribed word.
                    example: hello
                  startTime:
                    type: string
                    format: date-time
                    description: Start timestamp of this word.
                  endTime:
                    type: string
                    format: date-time
                    description: End timestamp of this word.
      example:
        type: TRANSCRIPTION
        text: Hi I need to check on my order status please
        transcription:
          channel: 0
          confidence: 0.95
          engine: twilio
          words:
          - text: Hi
            startTime: '2023-07-01T10:30:00.000Z'
            endTime: '2023-07-01T10:30:00.200Z'
          - text: I
            startTime: '2023-07-01T10:30:00.250Z'
            endTime: '2023-07-01T10:30:00.350Z'
          - text: need
            startTime: '2023-07-01T10:30:00.400Z'
            endTime: '2023-07-01T10:30:00.600Z'
          - text: to
            startTime: '2023-07-01T10:30:00.650Z'
            endTime: '2023-07-01T10:30:00.750Z'
          - text: check
            startTime: '2023-07-01T10:30:00.800Z'
            endTime: '2023-07-01T10:30:01.000Z'
    conversations.v2.configuration:
      type: object
      description: Configuration for Conversations.
      required:
      - id
      - displayName
      - description
      - conversationGroupingType
      - memoryStoreId
      properties:
        id:
          type: string
          description: Configuration ID.
          example: conv_configuration_01k1etk2y5f1y9fpe2epfdtvv2
        displayName:
          type: string
          description: A human-readable name for the configuration. Limited to 32
            characters.
          maxLength: 32
          pattern: ^[a-zA-Z0-9-_ ]+$
          example: My Support Config
        description:
          type: string
          description: Human-readable description for the Configuration. Allows spaces
            and special characters, typically limited to a paragraph of text. This
            serves as a descriptive field rather than just a name.
          example: Customer Support Configuration for handling all inbound customer
            inquiries
        conversationGroupingType:
          type: string
          enum:
          - GROUP_BY_PARTICIPANT_ADDRESSES
          - GROUP_BY_PARTICIPANT_ADDRESSES_AND_CHANNEL_TYPE
          description: "Type of Conversation grouping strategy:\n- `GROUP_BY_PARTICIPANT_ADDRESSES`:\
            \ Groups Communications by Participant addresses across all channels.\n\
            \  A customer using +18005550100 will be in the same Conversation whether\
            \ they contact by SMS, WhatsApp, or RCS.\n- `GROUP_BY_PARTICIPANT_ADDRESSES_AND_CHANNEL_TYPE`:\
            \ Groups Communications by both Participant addresses AND channel.\n \
            \ A customer using +18005550100 by SMS will be in a different Conversation\
            \ than the same customer by Voice.\n"
          example: GROUP_BY_PARTICIPANT_ADDRESSES
        memoryStoreId:
          type: string
          description: Memory Store ID for Profile resolution.
          example: mem_store_01k1etk2y5f1y9fpe2epfdtvv2
        channelSettings:
          $ref: '#/components/schemas/conversations.v2.channel_settings'
          description: Channel-specific configuration settings including timeout settings
            and capture rules.
        statusCallbacks:
          type: array
          description: List of default webhook configurations applied to Conversations
            under this Configuration.
          maxItems: 20
          items:
            $ref: '#/components/schemas/conversations.v2.status_callback_config'
        intelligenceConfigurationIds:
          type: array
          description: A list of Conversational Intelligence configuration IDs.
          items:
            type: string
          example:
          - agent1
          - agent2
        createdAt:
          type: string
          format: date-time
          description: Timestamp when this Configuration was created.
          readOnly: true
          example: '2023-10-14T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when this Configuration was last updated.
          readOnly: true
          example: '2023-10-14T15:45:30Z'
        version:
          type: integer
          format: int64
          description: Version number used for optimistic locking.
          readOnly: true
          example: 1
      example:
        id: conv_configuration_01k1etk2y5f1y9fpe2epfdtvv2
        displayName: Multi Channel Config
        description: Configuration supporting SMS, WhatsApp, and RCS channels
        conversationGroupingType: GROUP_BY_PARTICIPANT_ADDRESSES
        memoryStoreId: mem_store_01k1etk2y5f1y9fpe2epfdtvv2
        channelSettings:
          SMS:
            statusTimeouts:
              inactive: 10
              closed: 15
            captureRules:
            - from: '+18005550100'
              to: '*'
              metadata: {}
          WHATSAPP:
            statusTimeouts:
              inactive: 15
              closed: 60
            captureRules:
            - from: whatsapp:+18005550100
              to: '*'
              metadata: {}
          RCS:
            statusTimeouts:
              inactive: 15
              closed: 60
            captureRules:
            - from: rcs:brand_acme_agent
              to: '*'
              metadata: {}
        statusCallbacks:
        - url: https://webhook.example.com/conversation/status
          method: POST
        intelligenceConfigurationIds: []
        createdAt: '2023-10-14T10:30:00Z'
        updatedAt: '2023-10-14T15:45:30Z'
        version: 1
    conversations.v2.channel_settings:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/conversations.v2.channel_setting'
      description: Channel-specific configuration settings by channel type. Keys should
        be valid channel types (`VOICE`, `SMS`, `RCS`, `WHATSAPP`, `CHAT`).
      example:
        SMS:
          statusTimeouts:
            inactive: 10
            closed: 15
          captureRules:
          - from: '+18005550100'
            to: '+18005550101'
            metadata: {}
          - from: '+18005550103'
            to: '*'
            metadata: {}
          - from: '*'
            to: '+18005550103'
            metadata: {}
        VOICE:
          statusTimeouts:
            inactive: 5
            closed: 30
          captureRules:
          - from: '+18005550104'
            to: '+18005550105'
            metadata:
              callType: PSTN
          - from: '+18005550106'
            to: '*'
            metadata: {}
          - from: '*'
            to: '+18005550106'
            metadata: {}
        WHATSAPP:
          statusTimeouts:
            inactive: 15
            closed: 60
          captureRules:
          - from: whatsapp:+18005550100
            to: '*'
            metadata: {}
          - from: '*'
            to: whatsapp:+18005550100
            metadata: {}
        RCS:
          statusTimeouts:
            inactive: 15
            closed: 60
          captureRules:
          - from: rcs:brand_acme_agent
            to: '*'
            metadata: {}
          - from: '*'
            to: rcs:brand_acme_agent
            metadata: {}
          - from: rcs:+18005550107
            to: '*'
            metadata: {}
        CHAT:
          statusTimeouts:
            inactive: 15
            closed: 60
          captureRules:
          - from: '*'
            to: '*'
            metadata:
              chatService: IS00000000000000000000000000000000
    conversations.v2.channel_setting:
      type: object
      properties:
        statusTimeouts:
          $ref: '#/components/schemas/conversations.v2.status_timeouts'
        captureRules:
          type: array
          items:
            $ref: '#/components/schemas/conversations.v2.capture_rule'
          description: Array of capture rules with from/to addresses and optional
            metadata. Use `*` for wildcard matching in either direction.
      description: Configuration settings for a specific channel type.
    conversations.v2.status_timeouts:
      type: object
      properties:
        inactive:
          type: integer
          description: Inactivity timeout in minutes.
          minimum: 1
          example: 10
        closed:
          type: integer
          description: Close timeout in minutes.
          minimum: 1
          example: 15
      description: Timeout settings for channel status transitions.
    conversations.v2.capture_rule:
      type: object
      properties:
        from:
          type: string
          description: The from address. Use `*` for wildcard to match any from address.
          example: '+18005550100'
        to:
          type: string
          description: The to address. Use `*` for wildcard to match any to address.
          example: '*'
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Additional matching criteria for the capture rule. For voice
            calls, can include `callType` (`PSTN`, `SIP`, and similar).
          example:
            callType: PSTN
      required:
      - from
      - to
      description: Defines a capture rule with from and to addresses. Supports wildcard
        `*` for omnidirectional matching.
      example:
        from: '+18005550100'
        to: '*'
        metadata: {}
    conversations.v2.status_callback_config:
      type: object
      description: Default webhook configuration for Conversation-level events under
        this Configuration.
      required:
      - url
      properties:
        url:
          type: string
          format: uri
          description: Destination URL for webhooks.
        method:
          type: string
          default: POST
          enum:
          - POST
          - GET
          - PUT
          - DELETE
          - PATCH
          description: HTTP method used to invoke the webhook URL.
security:
- basic_apikey_or_accountsid: []
tags:
- name: ConversationsV2Configuration
  description: A conversation configuration is the top-level object in Maestro (Conversations).
    It contains the settings that define how Maestro (Conversations) captures traffic
    and connects to other services.
- name: ConversationsV2Conversation
  description: A conversation is a record of interactions between participants. It's
    the container for all communications that occur during an interaction, including
    voice calls, SMS messages, and other supported channels.
- name: ConversationsV2Participant
  description: A participant represents an actor involved in a conversation. Maestro
    (Conversations) assigns each participant a type that identifies their role, such
    as customer, human agent, or AI agent.
- name: ConversationsV2Communication
  description: "A communication is the smallest unit of interaction within a conversation.\
    \ Each communication represents a single event\u2014such as an SMS message or\
    \ a voice utterance."
paths:
  /v2/ControlPlane/Configurations:
    servers:
    - url: https://conversations.twilio.com
    get:
      summary: List Configurations
      description: Retrieve a list of Configurations.
      tags:
      - ConversationsV2Configuration
      parameters:
      - name: pageSize
        in: query
        description: Maximum number of items to return in a single response
