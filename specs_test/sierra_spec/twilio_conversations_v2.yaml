                - meta
                properties:
                  communications:
                    type: array
                    items:
                      type: object
                      required:
                      - id
                      - conversationId
                      - accountId
                      - author
                      - content
                      - recipients
                      properties:
                        id:
                          type: string
                          description: Communication ID.
                          example: conv_communication_01k1etk2y5f1y9fpe2epfdtvv2
                        conversationId:
                          type: string
                          description: Conversation ID.
