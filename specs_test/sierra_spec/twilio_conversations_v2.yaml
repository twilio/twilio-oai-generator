      description: Retrieve a list of Conversations.
      tags:
      - ConversationsV2Conversation
      parameters:
      - name: status
        in: query
        description: Filters for specific statuses
        required: false
        schema:
          type: array
          items:
            type: string
            enum:
            - ACTIVE
            - INACTIVE
            - CLOSED
      - name: channelId
        in: query
        description: The resource identifier (such as callSid or messageSid) to filter
          conversations.
        required: false
        schema:
          type: string
      - name: addresses
        in: query
        description: 'Filter Conversations by Participant addresses. Requires at least
          2 addresses.

          Returns Conversations across all channels for the specified address pair.

          Must be URL-encoded (''+'' becomes ''%2B'', ''@'' becomes ''%40'').

          '
        required: false
        schema:
          type: array
          items:
            type: string
      - name: pageSize
        in: query
        description: Maximum number of items to return in a single response
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          example: 50
      - name: pageToken
        in: query
        description: A URL-safe, base64-encoded token representing the page of results
          to return
        required: false
        schema:
          type: string
          example: eyJwYWdlIjoyLCJxdWVyeSI6ImJvb2tzIn0=
      security:
      - basic_apikey_or_accountsid: []
      operationId: ListConversationByAccount
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                - conversations
                - meta
                properties:
                  conversations:
                    type: array
                    minItems: 0
                    items:
                      type: object
                      required:
                      - id
                      - accountId
                      - configurationId
                      properties:
                        id:
                          type: string
                          description: Conversation ID.
                          example: conv_conversation_01k1etk2y5f1y9fpe2epfdtvv2
                        accountId:
                          type: string
                          description: Account ID.
                          example: ACaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
                        configurationId:
                          type: string
                          description: Configuration ID.
                          example: conv_configuration_01k1etk2y5f1y9fpe2epfdtvv2
                        status:
                          type: string
                          enum:
                          - ACTIVE
                          - INACTIVE
                          - CLOSED
                          description: Conversation status.
                          example: ACTIVE
                        name:
                          type: string
                          description: Conversation name.
                          example: Customer Support Chat
                          nullable: true
                        createdAt:
                          type: string
                          format: date-time
                          description: Timestamp when this Conversation was created.
                          example: '2023-07-01T12:00:00Z'
                        updatedAt:
                          type: string
                          format: date-time
                          description: Timestamp when this Conversation was last updated.
                          example: '2023-07-01T12:30:00Z'
                        configuration:
                          type: object
                          description: Full configuration settings for this Conversation.
                          properties:
                            displayName:
                              type: string
                              description: A human-readable name for the configuration.
                                Limited to 32 characters.
                              maxLength: 32
                              pattern: ^[a-zA-Z0-9-_ ]+$
                              example: My Support Config
                            description:
                              type: string
                              description: Human-readable description for the Configuration.
                              example: Customer Support Configuration for handling
                                all inbound customer inquiries
                            conversationGroupingType:
                              type: string
                              enum:
                              - GROUP_BY_PARTICIPANT_ADDRESSES
                              - GROUP_BY_PARTICIPANT_ADDRESSES_AND_CHANNEL_TYPE
                              description: "Type of Conversation grouping strategy:\n\
                                - `GROUP_BY_PARTICIPANT_ADDRESSES`: Groups Communications\
                                \ by Participant addresses across all channels.\n\
                                \  A customer using +18005550100 will be in the same\
                                \ Conversation whether they contact by SMS, WhatsApp,\
                                \ or RCS.\n- `GROUP_BY_PARTICIPANT_ADDRESSES_AND_CHANNEL_TYPE`:\
                                \ Groups Communications by both Participant addresses\
