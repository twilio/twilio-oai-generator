                required:
                - participants
                - meta
                properties:
                  participants:
                    type: array
                    items:
                      type: object
                      required:
                      - id
                      - conversationId
                      - accountId
                      - name
                      properties:
                        id:
                          type: string
                          description: Participant ID.
                          example: conv_participant_01k1etx3jbfx88476ccja0889c
