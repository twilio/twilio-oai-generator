                        conversationId: conv_conversation_01k1etk2y5f1y9fpe2epfdtvv2
                        accountId: ACaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
                        name: Dana
                        type: CUSTOMER
                        profileId: mem_profile_00000000000000000000000000
                        addresses:
                        - channel: SMS
                          address: '+18005550100'
                        - channel: WHATSAPP
                          address: whatsapp:+18005550100
                        - channel: RCS
