        accountId:
          type: string
          minLength: 34
          maxLength: 34
          pattern: ^AC[0-9a-fA-F]{32}$
          nullable: true
          description: The ID of the account that owns the Conversation.
        name:
          type: string
          nullable: true
          description: Display name of the Conversation.
        status:
