openapi: 3.0.1
info:
  title: Twilio Conversational Intelligence API
  description: "The Conversational Intelligence API includes resources to create and\
    \ manage intelligence configurations, define and run language operators, and retrieve\
    \ processed conversations and operator results.\n\n* Use the Configurations resource\
    \ to create and manage intelligence configurations and define rules that control\
    \ how and when language operators analyze and transform conversations. \n* Use\
    \ the Operators resource to create custom language operators or retrieve Twilio-author\
    \ and custom oeprators.\n* Use the Conversations resource to retrieve conversations\
    \ processed with an intelligence configuration, and the OperatorResults resource\
    \ to retrieve language operator results for those conversations.\n"
  termsOfService: https://www.twilio.com/legal/tos
  contact:
    name: Twilio Support
    url: https://support.twilio.com
    email: support@twilio.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: v3
  x-twilio:
    apiStandards: v1.0
security:
- basic_apikey_or_accountsid: []
