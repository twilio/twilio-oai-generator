  securitySchemes:
    basic_apikey_or_accountsid:
      scheme: basic
      type: http
      description: This API uses [basic authentication](https://www.twilio.com/docs/glossary/what-is-basic-authentication).
        Use an [API key](https://www.twilio.com/docs/iam/api-keys) as the username
        and the API key secret as the password. You can also use your account SID
        and auth token, but limit their use to local testing.
  schemas:
    OperatorResultsResponseV1:
      type: object
      title: Operator Results Response V1
      properties:
        outputFormat:
          $ref: '#/components/schemas/OutputFormat'
      discriminator:
        propertyName: outputFormat
        mapping:
          TEXT: '#/components/schemas/TextResult'
          JSON: '#/components/schemas/JSONResult'
          CLASSIFICATION: '#/components/schemas/ClassificationResult'
          EXTRACTION: '#/components/schemas/ExtractionResult'
      oneOf:
      - $ref: '#/components/schemas/TextResult'
      - $ref: '#/components/schemas/JSONResult'
      - $ref: '#/components/schemas/ClassificationResult'
      - $ref: '#/components/schemas/ExtractionResult'
    OutputFormat:
      type: string
      title: Output Format
      description: The output format set on the Operator that generated this result.
        Determines the structure of the `result` object.
      pattern: ^(CLASSIFICATION|TEXT|EXTRACTION|JSON)$
    OperatorResultsResponseBase:
      title: Operator Results Response Base
      properties:
        outputFormat:
          $ref: '#/components/schemas/OutputFormat'
        id:
          type: string
          nullable: false
          pattern: ^intelligence_operatorresult_[0-7][0-9a-z]{25}$
          description: A unique identifier for the Operator Result. Assigned by Twilio
            (TTID).
          example: intelligence_operator_result_01k6fc25s7epm9qtk8rszbv3q5
        accountId:
          type: string
          description: The ID of the Account that created the Language Operator.
          pattern: ^AC[a-zA-Z0-9]{32}$
        intelligenceConfiguration:
          description: Reference to the Intelligence Configuration that generated
            the Operator Result.
          $ref: '#/components/schemas/IntelligenceConfigurationReference'
        conversationId:
          type: string
          nullable: false
          pattern: ^conv_conversation_[0-7][0-9a-z]{25}$
          description: The `id` of the Conversation attached to the Operator Result.
          example: conv_conversation_01k1etk2y5f1y9fpe2epfdtvv2
        operator:
          description: Reference to the Language Operator that generated the Operator
            Result.
          $ref: '#/components/schemas/OperatorReference'
        dateCreated:
          type: string
          format: date-time
          description: Timestamp for when the Operator Result was created.
        referenceIds:
          type: array
          description: The `id`s of objects related to this Operator Result.
          items:
            type: string
            example: CA0fd5fb62ac7e24ce24f071041847aa92
            maxLength: 97
        executionDetails:
          $ref: '#/components/schemas/ExecutionDetails'
      required:
      - id
      - accountId
      - intelligenceConfiguration
      - conversationId
      - operator
      - dateCreated
      - outputFormat
      - referenceIds
      - executionDetails
    TextResult:
      title: Text result
      allOf:
      - $ref: '#/components/schemas/OperatorResultsResponseBase'
      - type: object
        required:
        - result
        properties:
          result:
            type: object
            description: The actual result from executing the Language Operator with
              `TEXT` output format.
            required:
            - text
            properties:
              text:
                type: string
                description: The plaintext result produced by the Language Operator.
    JSONResult:
      title: JSON result
      allOf:
      - $ref: '#/components/schemas/OperatorResultsResponseBase'
      - type: object
        required:
        - result
        properties:
          result:
            type: object
            description: The actual result from executing the Language Operator with
              `JSON` output format. Its structure depends on the `outputSchema` defined
              on the Operator.
            additionalProperties: true
    ClassificationResult:
      title: Classification result
      allOf:
      - $ref: '#/components/schemas/OperatorResultsResponseBase'
      - type: object
        required:
        - result
        properties:
          result:
            type: object
            description: The actual result from executing the Language Operator with
              `CLASSIFICATION` output format.
            required:
            - label
            properties:
              label:
                type: string
                description: The predicted label assigned by the Language Operator.
    ExtractionResult:
      title: Extraction result
      allOf:
      - $ref: '#/components/schemas/OperatorResultsResponseBase'
      - type: object
        required:
        - result
        properties:
          result:
            type: object
            description: The actual result from executing the Language Operator with
              `EXTRACTION` output format.
            required:
            - entities
            properties:
              entities:
                type: array
                description: List of extracted entities from the Conversation.
                items:
                  type: object
                  required:
                  - text
                  - label
                  properties:
                    text:
                      type: string
                      description: The actual text of the extracted entity as it appears
                        in the Conversation.
                    label:
                      type: string
                      description: The label for the extracted entity (e.g., `PERSON`,
                        `LOCATION`).
    IntelligenceConfigurationReference:
      type: object
      description: Reference to the Intelligence Configuration that generated the
        Operator Result.
      required:
      - id
      - ruleId
      - version
      properties:
        id:
          type: string
          nullable: false
          pattern: ^intelligence_configuration_[0-7][0-9a-z]{25}$
          description: Unique identifier for a Intelligence Configuration that generated
            the Operator Result. Assigned by Twilio (TTID).
          example: intelligence_configuration_01k6fc25s7epm9qtk8rszbv3q5
        ruleId:
          type: string
          nullable: false
          pattern: ^intelligence_configurationrule_[0-7][0-9a-z]{25}$
          description: Unique identifier of the rule of the Intelligence Configuration
            that triggered the result. Assigned by Twilio (TTID).
          example: intelligence_configurationrule_01k6fc25s7epm9qtk8rszbv3q6
        version:
          type: integer
          description: Version of the Intelligence Configuration used to generate
            the Operator Result.
    OperatorReference:
      type: object
      description: Reference to the Language Operator that generated the Operator
        Result.
      required:
      - id
      - version
      - parameters
      properties:
        id:
          type: string
          description: The `id` of the Language Operator.
        version:
          type: integer
          description: Version of the Language Operator used to generate the Operator
            Result.
        parameters:
          type: object
          description: Parameter values used for Operator execution, provided by the
            Rule at runtime. This object contains a dictionary of parameter keys and
            their corresponding values.
          additionalProperties: true
    ExecutionDetails:
      type: object
      description: Details about the conditions under which the Operator executed.
      properties:
        trigger:
          type: object
          description: Metadata for the trigger that generated this Operator Result.
          required:
          - 'on'
          - timestamp
          properties:
            'on':
              type: string
              description: 'The conversational lifecycle event that activated execution
                of the Rule. Available values are:

                - `COMMUNICATION`: Trigger the Rule on each communication within the
                Conversation.

                - `CONVERSATION_END`: Trigger the Rule when the Conversation moves
                to the `closed` state.

                - `CONVERSATION_INACTIVE`: Trigger the Rule when the Conversation
                moves to the `inactive` state.

                '
            timestamp:
              type: string
              format: date-time
              description: Timestamp of when the trigger was activated.
        communications:
          type: object
          description: Range of first and last communications in the Conversation
            that were processed during this Operator execution.
          required:
          - first
          - last
          properties:
            first:
              description: Communication `id` from the attached Conversation.
              type: string
              nullable: false
              pattern: ^conv_communication_[0-7][0-9a-z]{25}$
              example: conv_communication_01k1etk2y5f1y9fpe2epfdtvv2
            last:
              description: Communication `id` from the attached Conversation.
              type: string
              nullable: false
              pattern: ^conv_communication_[0-7][0-9a-z]{25}$
              example: conv_communication_01k1etk2y5f1y9fpe2epfdtvv2
        channels:
          type: array
          description: Communication channels included in the Conversation when this
            Operator was executed.
          items:
            type: string
        participants:
          type: array
          description: Metadata for the participants included in the Conversation
            when this Operator executed.
          items:
            type: object
            required:
            - id
            properties:
              id:
                type: string
                nullable: false
                pattern: ^conv_participant_[0-7][0-9a-z]{25}$
                description: The `id` of the Participant in the Conversation.
                example: conv_participant_01k1etx3jbfx88476ccja0889c
              profileId:
                type: string
                nullable: false
                pattern: ^mem_profile_[0-7][0-9a-z]{25}$
                description: Attached Profile `id` from the Customer Memory store.
                example: mem_profile_00000000000000000000000000
              type:
                type: string
                description: 'Type of participant in the conversation. Available addressValues:

                  - `CUSTOMER`

                  - `HUMAN_AGENT`

                  - `AI_AGENT`

                  '
        context:
          $ref: '#/components/schemas/OperatorResultContext'
      required:
      - trigger
      - communications
      - channels
      - participants
    OperatorResultContext:
      type: object
      description: 'Snapshot of the Operator''s access to contextual data at runtime.

        Includes whether Customer Memory and Knowledge Bases were made available to
        the Operator for use during execution.

        '
      properties:
        customerMemory:
          $ref: '#/components/schemas/CustomerMemoryContext'
        knowledge:
          $ref: '#/components/schemas/KnowledgeContext'
    CustomerMemoryContext:
      type: object
      description: Customer Memory applied to this Operator execution.
      properties:
        profileId:
          type: string
          description: The customer profile `id` made available to the Language Operator
            for use during execution.
          example: mem_profile_01k6fbz0v4f4e9qtk8p8z7y3w1
        memoryStoreId:
          type: string
          description: The memory store `id` associated with the customer profile
            resolved.
          example: mem_store_01k6fbz0v4f4e9qtk8p8z7y3w2
      required:
      - profileId
      - memoryStoreId
    KnowledgeContext:
      type: object
      description: Knowledge applied to this Operator execution.
      properties:
        bases:
          type: array
          description: The `id`s of the Knowledge Base(s) made available to the Language
            Operator for use during execution.
          items:
            type: string
            description: The `id` of a Knowledge Base.
            example: KS_common_policies_002
      required:
      - bases
    IntelligenceConfiguration:
      type: object
      description: "An Intelligence Configuration defines how and when Language Operators\
        \ execute for a given conversation.\n\nTo activate an Intelligence Configuration\
        \ and trigger Operator execution, two conditions must be met:\n1. The Intelligence\
        \ Configuration must include at least one Rule.\n2. The Intelligence Configuration\
        \ must be attached to a Conversations Configuration via the Conversations\
        \ API.\n   Conversation traffic received by that Conversations Configuration\
        \ determines when Rules are evaluated\n   and executed.\n\nAn Intelligence\
        \ Configuration that has no Rules or is not attached to a Conversations Configuration\
        \ will not execute.\n"
      required:
      - accountId
      - id
      - displayName
      - version
      - rules
      - dateCreated
      - dateUpdated
      properties:
        accountId:
          type: string
          example: ACaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          x-jvm-type: com.twilio.sids.AccountSid
          description: The ID of the Account that created the Intelligence Configuration.
        id:
          type: string
          description: The unique identifier for the Intelligence Configuration. Assigned
            by Twilio (TTID).
        displayName:
          type: string
          description: The display name of the Intelligence Configuration describing
            its purpose.
          minLength: 1
          maxLength: 128
        description:
          type: string
          description: The description of the Intelligence Configuration further explaining
            its purpose.
        version:
          type: integer
          description: The numeric version of the Intelligence Configuration. Automatically
            incremented with each update on the resource, used to ensure integrity
            when updating the Configuration.
        rules:
          type: array
          items:
            $ref: '#/components/schemas/Rule'
          maxItems: 5
          description: 'List of Intelligence Configuration Rules that govern when
            and how Language Operators run.

            Each Rule represents a bundle of Operators, Triggers, Context, and Actions
            to be executed by

            the Intelligence Configuration on a Conversation. A maximum of five (5)
            Rules are allowed per

            Intelligence Configuration.

            '
        dateCreated:
          description: Timestamp of when the Intelligence Configuration was created.
          type: string
          format: date-time
        dateUpdated:
          description: Timestamp of when the Intelligence Configuration was last updated.
          type: string
          format: date-time
    Rule:
      type: object
      required:
      - id
      - operators
      - triggers
      - actions
      properties:
        id:
          type: string
          description: The unique identifier for the Rule. Assigned by Twilio (TTID).
        operators:
          type: array
          items:
            $ref: '#/components/schemas/Operator'
          maxItems: 5
          description: List of Operators to be executed by the Rule. Maximum of five
            (5) Operators allowed per Rule.
        triggers:
          type: array
          items:
            $ref: '#/components/schemas/Trigger'
          maxItems: 1
          description: List of Triggers that determine when to activate the Rule.
            Maximum of one (1) Trigger allowed per Rule.
        actions:
          type: array
          items:
            $ref: '#/components/schemas/Action'
          maxItems: 2
          description: List of Actions to be performed after the Rule is triggered.
            Maximum of two (2) Actions allowed per Rule.
        context:
          $ref: '#/components/schemas/Context'
    Operator:
      type: object
      required:
      - id
      properties:
        id:
          type: string
          description: The unique identifier for the Language Operator to be executed
            by the Rule. Assigned by Twilio (TTID).
        parameters:
          type: object
          description: 'Key-value mapping for parameters defined as part of the Operator
            schema. The key and value passed by the Rule must match the name and data
            type of the parameter defined in the Operator, respectively.

            These parameters will customize the behavior of the Operator when executed
            by the Rule via runtime substitution into the prompt.

            Note: For parameters of type `knowledge_base_and_source_ids`, the value
            must be passed in the following format: `knowledge_base_id:knowledge_source_id`.

            '
    Trigger:
      type: object
      required:
      - 'on'
      properties:
        'on':
          type: string
          description: 'The conversational lifecycle event that will activate execution
            of the Rule.

            Available values are:

            - `COMMUNICATION`: Trigger the Rule on each communication within the Conversation.

            - `CONVERSATION_END`: Trigger the Rule when the Conversation moves to
            the `closed` state

            - `CONVERSATION_INACTIVE`: Trigger the Rule when the Conversation moves
            to `inactive` state

            '
          enum:
          - COMMUNICATION
          - CONVERSATION_END
          - CONVERSATION_INACTIVE
    Action:
      type: object
      required:
      - type
      - method
      - url
      properties:
        type:
          type: string
          enum:
          - WEBHOOK
          description: 'The type of Action to be performed after the Rule is triggered.
            Supported Actions are:

            - `WEBHOOK`: A webhook Action sends an HTTP request to a specified URL
            with Rule execution results.

            '
        method:
          type: string
          enum:
          - POST
          description: The HTTP method to be used when performing the Action. Must
            be set to `POST`.
        url:
          type: string
          format: uri
          description: The URL endpoint where the Action will send the HTTP request
            containing the Rule execution results.
    Context:
      type: object
      description: Controls what additional customer and enterprise context is made
        available to Language Operators when this Rule executes.
      properties:
        customerMemory:
          type: object
          description: "Configuration for passing Customer Memory as context to Operators\
            \ in this Rule (available only for Customer Memory\u2013enabled accounts)."
          properties:
            enabled:
              type: boolean
              description: 'When set to `true`, allows this Intelligence Configuration
                Rule to pass the Customer Profile

                into attached Language Operators. The profile is only passed to Language
                Operators

                that have Customer Memory as a context source enabled.

                '
        knowledge:
          type: object
          description: "Configuration for passing Enterprise Knowledge as context\
            \ to Operators in this Rule (available only for Enterprise Knowledge\u2013\
            enabled accounts)."
          properties:
            bases:
              type: array
              description: 'Specifies the Knowledge Base(s) and corresponding Source(s)
                to pass to Language

                Operators in this Rule as context. Only applied to Language Operators
                that have

                Knowledge as a context source enabled.

                '
              items:
                type: string
              minItems: 1
          required:
          - bases
    RuleCreationRequestPayload:
      type: object
      required:
      - operators
      - triggers
      - actions
      properties:
        operators:
          type: array
          description: List of Operators to be executed by the Rule. Minimum of one
            (1) and maximum of five (5) Operators allowed per Rule.
          items:
            $ref: '#/components/schemas/Operator'
          minItems: 1
          maxItems: 5
        triggers:
          type: array
          description: List of Triggers that determine when to activate the Rule.
            Maximum of one (1) Trigger allowed per Rule.
          items:
            $ref: '#/components/schemas/Trigger'
          maxItems: 1
        actions:
          type: array
          description: List of Actions to be performed after the Rule is triggered.
            Maximum of two (2) Actions allowed per Rule.
          items:
            $ref: '#/components/schemas/Action'
          maxItems: 2
        context:
          $ref: '#/components/schemas/Context'
    RuleUpdateRequestPayload:
      type: object
      required:
      - operators
      - triggers
      - actions
      properties:
        id:
          type: string
          description: 'Optional field used when updating an existing Rule within
            an Intelligence Configuration.

            When provided, the Rule with this `id` is updated; when omitted, a new
            Rule is created.

            '
        operators:
          type: array
          description: List of Operators to be executed by the Rule. Minimum of one
            (1) and maximum of five (5) Operators allowed per Rule.
          items:
            $ref: '#/components/schemas/Operator'
          minItems: 1
          maxItems: 5
        triggers:
          type: array
          description: List of Triggers that determine when to activate the Rule.
            Maximum of one (1) Trigger allowed per Rule.
          items:
            $ref: '#/components/schemas/Trigger'
          maxItems: 1
        actions:
          type: array
          description: List of Actions to be performed after the Rule is triggered.
            Maximum of two (2) Actions allowed per Rule.
          items:
            $ref: '#/components/schemas/Action'
          maxItems: 2
        context:
          $ref: '#/components/schemas/Context'
    CreateConfigurationRequest:
      type: object
      description: Request body for creating a new Intelligence Configuration.
      properties:
        displayName:
          type: string
          description: The display name of the Intelligence Configuration describing
            its purpose.
          minLength: 1
          maxLength: 128
        description:
          type: string
          description: The description of the Intelligence Configuration further explaining
            its purpose.
        rules:
          description: 'List of Intelligence Configuration Rules that govern when
            and how Language Operators run.

            Each Rule represents a bundle of Operators, Triggers, Context, and Actions
            to be executed by

            the Intelligence Configuration on a Conversation. A maximum of five (5)
            Rules are allowed per

            Intelligence Configuration.


            To create an Intelligence Configuration without any Rules configured yet,
            pass an empty array

            (`"rules": []`). The Configuration will not execute any Language Operators
            until at least one Rule

            has been added.

            '
          type: array
          items:
            $ref: '#/components/schemas/RuleCreationRequestPayload'
          maxItems: 5
      required:
      - displayName
      - rules
    UpdateConfigurationRequest:
      type: object
      required:
      - displayName
      - rules
      properties:
        displayName:
          type: string
          description: The display name of the Intelligence Configuration describing
            its purpose.
          minLength: 1
          maxLength: 128
        description:
          type: string
          description: The description of the Intelligence Configuration further explaining
            its purpose.
        rules:
          type: array
          description: 'List of Intelligence Configuration Rules that govern when
            and how Language Operators run.

            Each Rule represents a bundle of Operators, Triggers, Context, and Actions
            to be executed by

            the Intelligence Configuration on a Conversation. A maximum of five (5)
            Rules are allowed per

            Intelligence Configuration.

            '
          items:
            $ref: '#/components/schemas/RuleUpdateRequestPayload'
          maxItems: 5
    PaginatedConfigurationResponse:
      type: object
      description: The response object returned when listing Intelligence Configurations.
      required:
      - items
      - meta
      properties:
        items:
          type: array
          description: The list of Intelligence Configurations owned by this account.
          items:
            $ref: '#/components/schemas/IntelligenceConfiguration'
        meta:
          type: object
          description: The metadata for Pagination
          properties:
            key:
              description: A key, sibling to the `meta` object that holds the actual
                list of resources
              type: string
            pageSize:
              description: The actual number of resources returned in the response
              type: integer
            previousToken:
              type: string
            nextToken:
              type: string
          required:
          - key
          - pageSize
    ListOperatorsResponse:
      type: object
      required:
      - items
      - meta
      properties:
        items:
          type: array
          description: List of available Language Operators
          items:
            $ref: '#/components/schemas/LanguageOperator'
        meta:
          type: object
          properties:
            key:
              description: A key, sibling to the `meta` object that holds the actual
                list of resources
              type: string
            pageSize:
              description: The actual number of resources returned in the response
              type: integer
            previousToken:
              type: string
            nextToken:
              type: string
          required:
          - key
          - pageSize
    CreateOrUpdateOperatorRequest:
      allOf:
      - $ref: '#/components/schemas/LanguageOperator'
      - required:
        - displayName
        - prompt
        - outputFormat
    OperatorAvailability:
      type: string
      readOnly: true
      description: 'Indicates the availability of the Operator resource to be added
        to Intelligence Configurations.


        Available values:

        - `INTERNAL`: Only available to internal Twilio employees

        - `PRIVATE`: Available to a private group of customers

        - `PUBLIC`: Available to all customers

        - `DEPRECATED`: Available to existing Intelligence Configurations that use
        it, but no longer be added to any Intelligence Configurations

        - `RETIRED`: No longer available


        **Note**: `SELF`-authored operators will always have `PRIVATE` availability,
        regardless of the value provided.'
      enum:
      - INTERNAL
      - PRIVATE
      - PUBLIC
      - DEPRECATED
      - RETIRED
    LanguageOperator:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/OperatorTtid'
        displayName:
          type: string
          description: Display name of the Language Operator describing its purpose.
        description:
          type: string
          description: Description of the Language Operator further explaining its
            purpose.
        version:
          type: string
          readOnly: true
          description: Numeric Operator version. Automatically incremented with each
            update on the resource, used to ensure integrity when updating the Operator.
        availability:
          $ref: '#/components/schemas/OperatorAvailability'
        author:
          $ref: '#/components/schemas/OperatorAuthorEnum'
        prompt:
          type: string
          description: 'The natural language instructions used by the operator to
            analyze the conversation.


            Within the prompt, users can reference parameters using the `{{parameters.[param_name]}}`
            syntax. Parameter values are provided to the Operator by the Intelligence
            Configuration Rule at runtime.


            **Note**: Prompts will only be exposed for Custom Operators (`author`
            = `SELF`). Twilio-authored Operators (`author` = `TWILIO`) will have their
            prompts omitted from the API.'
        outputFormat:
          $ref: '#/components/schemas/OperatorOutputFormat'
        outputSchema:
          $ref: '#/components/schemas/OperatorOutputSchema'
        trainingExamples:
          type: array
          description: "An array of example input/output pairs used to illustrate\
            \ the intended behavior of the Language Operator. These examples help\
            \ guide the model's understanding of expected input\u2013output relationships\
            \ and improve consistency during evaluation and testing.\n\n**Note**:\
            \ Training examples will only be exposed for Custom Operators (`author`\
            \ = `SELF`). Twilio-authored Operators (`author` = `TWILIO`) will have\
            \ their training examples omitted from the API."
          items:
            $ref: '#/components/schemas/OperatorTrainingExample'
        context:
          $ref: '#/components/schemas/OperatorContext'
        parameters:
          $ref: '#/components/schemas/OperatorParameters'
    OperatorAuthorEnum:
      type: string
      readOnly: true
      description: "The creator and maintainer of the Language Operator. \n\nAvailable\
        \ values:\n- `SELF` - Created and maintained by the customer (Custom Operator)\n\
        - `TWILIO` - Created and maintained by Twilio (Twilio-Authored Operator)"
      enum:
      - SELF
      - TWILIO
    OperatorOutputFormat:
      type: string
      description: 'The structure of the result returned by the Language Operator
        (specific to what the LLM returns, not the entirety of the Operator Result
        resource).


        Available values:

        - `TEXT`:  The Operator will return plaintext from the LLM.

        - `JSON`: the Operator will return a structured object with schema defined
        in `output_schema`

        - `CLASSIFICATION`: The Operator will return the determined classifier string.'
      enum:
      - TEXT
      - JSON
      - CLASSIFICATION
    OperatorOutputSchema:
      type: object
      description: "Required for `JSON` output only. this will be set to a JSON Schema\
        \ object describing the properties & data types of the response. Please see\
        \ https://platform.openai.com/docs/guides/structured-outputs#supported-schemas\
        \ \n\nWill include the following keywords:\n- `type` : Must be set to `object`\n\
        - `properties`:  An object containing the property names and their data types\
        \ you would like the LLM to return\n\nAdditional details on JSON output formatting:\n\
        - The root level `type` of a JSON schema must be set to `object`\n- The following\
        \ property data types are supported : `string`, `number`, `boolean`, `integer`,\
        \ `object`, `array`, `anyOf`\n- Definitions with `$defs` / `$ref` are supported\n\
        - Max 100 object properties and 10 levels of nesting are supported\n- Max\
        \ 1000 enum values across all enum properties are supported\n- Notable JSON\
        \ Schema keywords not supported include:\n  - For `strings`: `minLength`,\
        \ `maxLength`\n  - For `objects`: `patternProperties`, `unevaluatedProperties`,\
        \ `propertyNames`, `minProperties`, `maxProperties`\n  - For `arrays`: `unevaluatedItems`,\
        \ `contains`, `minContains`, `maxContains`, `uniqueItems`\n- Structured Operator\
        \ Results will be returned in the same order as the ordering of keys in the\
        \ schema\n- In the event an Operator execution request is refused for safety\
        \ reasons the Operator Result API response will include a new field called\
        \ `refusal` to indicate that the LLM refused to fulfill the request\n- Twilio\
        \ will automatically set `additionalProperties` to false and specify all provided\
        \ fields as required (constraints of Structured Outputs). You don't need to\
        \ pass these fields as part of your JSON schema. Twilio will automatically\
        \ overwrite any user-provided values for these fields."
    OperatorTrainingExample:
      type: object
      required:
      - input
      - output
      properties:
        input:
          type: string
          description: A sample input text that demonstrates the type of content the
            Operator processes.
        output:
          type: string
          description: 'The expected output corresponding to the provided input example.

            This value must be consistent with the defined `output_format` and `output_schema`
            of the Operator.'
    OperatorContext:
      type: object
      description: "Optionally specifies which contextual data sources (Customer Memory,\
        \ Knowledge) the operator can access during execution. Context objects will\
        \ be passed in by the Intelligence Configuration Rule at runtime.\n\n**Note**:\
        \ this simply gives the LLM access to these context objects \u2013 ultimately\
        \ the LLM will determine whether to actually call for context at runtime."
      properties:
        customerMemory:
          type: object
          description: "Defines whether the Operator has access to the Customer\u2019\
            s Memory (past conversational memories and profile traits)."
          properties:
            enabled:
              type: boolean
              description: Set to true to allow access to Customer Memory at runtime.
        knowledge:
          type: object
          description: Defines whether the Operator has access to organizational Knowledge
            Sources (e.g., policies, FAQs, scripts) at runtime.
          properties:
            enabled:
              type: boolean
              description: Set to true to allow access to Knowledge Sources at runtime.
    OperatorParameters:
      type: object
      description: 'Defines the schema of the parameters that are provided when running
        the operator, including required and optional values that determine the operator''s
        behavior.

        The values of the parameters themselves are passed in by the attached Intelligence
        Configuration.'
      additionalProperties:
        $ref: '#/components/schemas/OperatorParameter'
    OperatorParameter:
      type: object
      required:
      - type
      properties:
        type:
          type: string
          description: 'The data type of the parameter (e.g., STRING, INTEGER).

            Available values: STRING, INTEGER, NUMBER, BOOLEAN, KNOWLEDGE_BASE_AND_SOURCE_IDS


            KNOWLEDGE_BASE_AND_SOURCE_IDS is a special type of parameter that refers
            to a Memora Knowledge Source, prefixed with its Knowledge Base container.
            Support for KB type = plaintext only.

            During Intelligence Configuration creation, this parameter is linked to
            a specific Knowledge Source. The operator receives the resolved plaintext
            at runtime and injects it into the prompt.

            The value of this parameter is expected to be passed in the following
            format: knowledge_base_id:knowledge_source_id.'
          enum:
          - STRING
          - INTEGER
          - NUMBER
          - BOOLEAN
          - KNOWLEDGE_BASE_AND_SOURCE_IDS
        default:
          description: 'Default value to use in the prompt if no value is provided
            by the Intelligence Configuration.

            Note: knowledge_base_and_source_ids does not support the default attribute,
            but all other param types do allow for a default value.'
        required:
          type: boolean
          description: Whether this parameter must be set at Operator execution time.
            Defaults to false if not provided.
        description:
          type: string
          description: A human-readable description of the parameter.
    OperatorTtid:
      type: string
      nullable: false
      readOnly: true
      pattern: ^intelligence_operator_[0-7][0-9a-z]{25}$
      description: The unique identifier for the Language Operator. Assigned by Twilio
        (TTID).
      example: intelligence_operator_01k6fc25s7epm9qtk8rszbv3q5
    OperatorResultTtid:
      type: string
      nullable: false
      pattern: ^intelligence_operatorresult_[0-7][0-9a-z]{25}$
      description: A unique identifier for the Operator Result. Assigned by Twilio
        (TTID).
      example: intelligence_operator_result_01k6fc25s7epm9qtk8rszbv3q5
    ConversationTtid:
      type: string
      nullable: false
      pattern: ^conv_conversation_[0-7][0-9a-z]{25}$
      description: The `id` of the Conversation attached to the Operator Result.
      example: conv_conversation_01k1etk2y5f1y9fpe2epfdtvv2
    ParticipantTtid:
      type: string
      nullable: false
      pattern: ^conv_participant_[0-7][0-9a-z]{25}$
      description: The `id` of the Participant in the Conversation.
      example: conv_participant_01k1etx3jbfx88476ccja0889c
    ParticipantProfileTtid:
      type: string
      nullable: false
      pattern: ^mem_profile_[0-7][0-9a-z]{25}$
      description: Attached Profile `id` from the Customer Memory store.
      example: mem_profile_00000000000000000000000000
    CommunicationTtid:
      type: string
      nullable: false
      pattern: ^conv_communication_[0-7][0-9a-z]{25}$
      description: Communication `id` from the attached Conversation.
      example: conv_communication_01k1etk2y5f1y9fpe2epfdtvv2
    IntelligenceConfigurationTtid:
      type: string
      nullable: false
      pattern: ^intelligence_configuration_[0-7][0-9a-z]{25}$
      description: Unique identifier for a Intelligence Configuration that generated
        the Operator Result. Assigned by Twilio (TTID).
      example: intelligence_configuration_01k6fc25s7epm9qtk8rszbv3q5
    IntelligenceConfigurationRuleTtid:
