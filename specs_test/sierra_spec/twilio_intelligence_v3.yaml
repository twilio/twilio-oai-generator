          nullable: true
          description: Participant display name.
        type:
          type: string
          nullable: true
          description: 'Type of participant in the conversation. Available types:

            - `CUSTOMER`

            - `HUMAN_AGENT`

            - `AI_AGENT`

            '
        addressValues:
          type: array
          items:
            type: string
          description: Participant address values (for example, a phone number or
            sender identifier).
    Channel:
      type: string
      description: Communication channel type.
      enum:
      - VOICE
      - SMS
      - RCS
      - EMAIL
      - WHATSAPP
      - CHAT
      - API
      - SYSTEM
    ConversationStatus:
      type: string
      description: The status of the Conversation.
      enum:
      - ACTIVE
      - INACTIVE
      - CLOSED
    Conversation:
      type: object
      required:
      - id
      - accountId
      - name
      - status
      - createdAt
      - updatedAt
      - intelligenceConfigurationIds
      - conversationConfigurationId
      - channels
      - channelIds
      - participants
      - communications
