servers:
- url: https://intelligence.twilio.com
  description: Twilio Intelligence API
tags:
- name: Configurations
  description: "Define and manage intelligence configuration. The Configurations resource\
    \ defines how and when\nlanguage operators execute on conversations via rules\
    \ that encapsulate triggers, context, and actions.\n\nAn intelligence configuration\
    \ is a container for one or more rules. Each rule specifies:\n\n- Which languate\
    \ operators to execute\n- Which conversation lifecycle event triggers the rule\n\
    - Which contextual data language operators can access at runtime \n- Which action\
    \ to take on the results\n\nConfigurations are evaluated automatically as conversation\
    \ activity occurs, providing consistent,\nreusable intelligence logic across channels\
    \ and over time.\n"
- name: Operators
  description: 'Define and manage lanague operators. Conversational Intelligence uses
    GenAI-powered language operators to transform conversation text into structured
    insights.


    Language operators produce structured outputs and can be reused across multiple
    intelligence configurations. Language operators are executed automatically according
    to rules you define.


    Use Twilio-authored language operators for common use cases (Sentiment, Summar,
    Next Best Reponse, and Script Adhereance) or create custom language operators
    to meet your business needs.

    '
- name: OperatorResults
  description: 'Retrieve results produced by language operators after they run on
    conversations,

    including associated execution metadata generated at runtime. Use these sults
    to support real-time agent augmentation, workflow automation, and aggregate conversational
    insights.


    Results are generated when Conversations are processed by intelligence configuration
    rules and can be

    queried independently of the original conversation lifecycle.

    '
- name: Conversations
  description: 'Retrieve conversations processed by an intelligence configuration,
    including

    associated execution metadata and contextual information.


    The Conversations resource lets you to inspect conversations alongside their applied
    intelligence, including which

    rules were evaluated, which language operators ran, and what results were produced.


    Use this resource to understand how Conversational Intelligence was applied to
    a given interaction

    and to correlate conversation transcripts with language operator results.

    '
paths:
  /v3/ControlPlane/Configurations:
    post:
      summary: Create an Intelligence Configuration
      tags:
      - Configurations
      security:
      - basic_apikey_or_accountsid: []
      operationId: CreateConfiguration
      description: 'Create an Intelligence Configuration to control how and when language
        operators analyze conversations.


        You must include the `rules` field in the request. You can pass an empty array
        (`"rules": []`), but an Intelligence Configuration with an empty `rules` array
        doesn''t execute any language operators. To add rules later, make a `PUT /v3/ControlPlane/Configurations/{id}`
        request.


        After creating an Intelligence Configuration, you must attach it to a Conversations
        Configuration by using the Conversations API.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Request body for creating a new Intelligence Configuration.
              properties:
                displayName:
                  type: string
                  description: The display name of the Intelligence Configuration
                    describing its purpose.
                  minLength: 1
                  maxLength: 128
                description:
                  type: string
                  description: The description of the Intelligence Configuration further
                    explaining its purpose.
                rules:
                  description: 'List of Intelligence Configuration Rules that govern
                    when and how Language Operators run.

                    Each Rule represents a bundle of Operators, Triggers, Context,
                    and Actions to be executed by

                    the Intelligence Configuration on a Conversation. A maximum of
                    five (5) Rules are allowed per

                    Intelligence Configuration.


                    To create an Intelligence Configuration without any Rules configured
                    yet, pass an empty array

                    (`"rules": []`). The Configuration will not execute any Language
                    Operators until at least one Rule

                    has been added.

                    '
                  type: array
                  items:
                    $ref: '#/components/schemas/RuleCreationRequestPayload'
                  maxItems: 5
              required:
              - displayName
              - rules
            examples:
              createConfigurationRequest:
                $ref: '#/components/examples/CreateConfigurationRequestExample'
      responses:
        '201':
          description: Intelligence Configuration resource created.
          content:
            application/json:
              schema:
                type: object
                description: "An Intelligence Configuration defines how and when Language\
                  \ Operators execute for a given conversation.\n\nTo activate an\
                  \ Intelligence Configuration and trigger Operator execution, two\
                  \ conditions must be met:\n1. The Intelligence Configuration must\
                  \ include at least one Rule.\n2. The Intelligence Configuration\
                  \ must be attached to a Conversations Configuration via the Conversations\
                  \ API.\n   Conversation traffic received by that Conversations Configuration\
                  \ determines when Rules are evaluated\n   and executed.\n\nAn Intelligence\
                  \ Configuration that has no Rules or is not attached to a Conversations\
                  \ Configuration will not execute.\n"
                required:
                - accountId
                - id
                - displayName
                - version
                - rules
                - dateCreated
                - dateUpdated
                properties:
                  accountId:
                    type: string
                    example: ACaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
                    x-jvm-type: com.twilio.sids.AccountSid
                    description: The ID of the Account that created the Intelligence
                      Configuration.
                  id:
                    type: string
                    description: The unique identifier for the Intelligence Configuration.
                      Assigned by Twilio (TTID).
                  displayName:
                    type: string
                    description: The display name of the Intelligence Configuration
                      describing its purpose.
                    minLength: 1
                    maxLength: 128
                  description:
                    type: string
                    description: The description of the Intelligence Configuration
                      further explaining its purpose.
                  version:
                    type: integer
                    description: The numeric version of the Intelligence Configuration.
                      Automatically incremented with each update on the resource,
                      used to ensure integrity when updating the Configuration.
                  rules:
                    type: array
                    items:
                      $ref: '#/components/schemas/Rule'
                    maxItems: 5
                    description: 'List of Intelligence Configuration Rules that govern
                      when and how Language Operators run.

                      Each Rule represents a bundle of Operators, Triggers, Context,
                      and Actions to be executed by

                      the Intelligence Configuration on a Conversation. A maximum
                      of five (5) Rules are allowed per

                      Intelligence Configuration.

                      '
                  dateCreated:
                    description: Timestamp of when the Intelligence Configuration
                      was created.
                    type: string
                    format: date-time
                  dateUpdated:
                    description: Timestamp of when the Intelligence Configuration
                      was last updated.
                    type: string
                    format: date-time
              examples:
                createConfigurationResponse:
                  $ref: '#/components/examples/IntelligenceConfigurationExample'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    description: Twilio-specific error code
                    type: integer
                    format: int32
                  message:
