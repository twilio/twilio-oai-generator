  /v3/Conversations:
    description: Intelligence Conversations resource to retrieve conversations that
      have been processed by an Intelligence Configuration.
    get:
      description: Retrieve a list of Conversations processed by an Intelligence Configuration.
      summary: Retrieve a list of Conversations
      operationId: ListConversations
      tags:
      - Conversations
      parameters:
      - name: pageSize
        in: query
        description: The maximum number of resources to return
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 50
      - name: pageToken
        in: query
        description: Token for pagination
        required: false
        schema:
          type: string
      - name: createdAtBefore
        in: query
        description: Filter by Conversations created before this timestamp.
        required: false
        schema:
          type: string
          format: date-time
      - name: createdAtAfter
        in: query
        description: Filter by Conversations created after this timestamp.
        required: false
        schema:
          type: string
          format: date-time
      - name: status
        in: query
        description: Filter by Conversation status.
        required: false
        schema:
          type: string
          description: The status of the Conversation.
          enum:
          - ACTIVE
          - INACTIVE
          - CLOSED
      - name: channelId
        in: query
        description: Filters Conversations by the underlying channel resource ID,
          such as a Call ID or Message ID.
        required: false
        schema:
          type: string
      - name: channels
        in: query
        description: Filters Conversations that include one or more of the specified
          communication channels (`OR` match).
        required: false
        schema:
          type: array
          items:
            type: string
            description: Communication channel type.
            enum:
            - VOICE
            - SMS
            - RCS
            - EMAIL
            - WHATSAPP
            - CHAT
            - API
            - SYSTEM
      - name: conversationConfigurationId
        in: query
        description: The configuration `id` used to generate the Conversation.
        required: false
        schema:
          type: string
          nullable: false
          description: The `id` of the Configuration for a Conversation.
          example: conv_configuration_00000000000000000000000000
      - name: intelligenceConfigurationIds
        in: query
        description: Filters Conversations activated by one or more of the specified
          Intelligence Configuration IDs (`OR` match).
        required: false
        schema:
          type: array
          items:
            type: string
            nullable: false
            pattern: ^intelligence_configuration_[0-7][0-9a-z]{25}$
            description: Unique identifier for a Intelligence Configuration that generated
              the Operator Result. Assigned by Twilio (TTID).
            example: intelligence_configuration_01k6fc25s7epm9qtk8rszbv3q5
      - name: operatorIds
        in: query
        description: Filters Conversations to those where at least one of the specified
          Language Operators was executed (`OR` match).
        required: false
        schema:
          type: array
          items:
            type: string
            nullable: false
            readOnly: true
            pattern: ^intelligence_operator_[0-7][0-9a-z]{25}$
            description: The unique identifier for the Language Operator. Assigned
              by Twilio (TTID).
            example: intelligence_operator_01k6fc25s7epm9qtk8rszbv3q5
      - name: participantAddress
        in: query
        description: Filters Conversations by participant address values (for example,
          a phone number or sender identifier).
        required: false
        schema:
          type: string
      responses:
        '200':
          description: An array of Conversations.
          content:
            application/json:
              schema:
                type: object
                required:
                - items
                - meta
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Conversation'
                    description: List of conversations.
                  meta:
                    type: object
                    properties:
                      key:
                        description: A key, sibling to the `meta` object that holds
                          the actual list of resources
                        type: string
                      pageSize:
                        description: The actual number of resources returned in the
                          response
                        type: integer
                      previousToken:
                        type: string
                      nextToken:
                        type: string
                    required:
                    - key
                    - pageSize
              examples:
                conversationList:
                  $ref: '#/components/examples/ConversationListExample'
        '400':
          description: Bad request
