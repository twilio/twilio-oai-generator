      nullable: false
      pattern: ^intelligence_configurationrule_[0-7][0-9a-z]{25}$
      description: Unique identifier of the rule of the Intelligence Configuration
        that triggered the result. Assigned by Twilio (TTID).
      example: intelligence_configurationrule_01k6fc25s7epm9qtk8rszbv3q6
    ConfigurationTtid:
      type: string
      nullable: false
      description: The `id` of the Configuration for a Conversation.
      example: conv_configuration_00000000000000000000000000
    Content:
      type: object
      description: The content of the communication.
      properties:
        text:
          type: string
          description: The transcript of the communication.
    Communication:
      type: object
      required:
