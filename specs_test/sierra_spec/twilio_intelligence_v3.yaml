        createdAt:
          type: string
          format: date-time
          description: Timestamp for when the Conversation was created.
        updatedAt:
          type: string
          format: date-time
          description: Timestamp for when the Conversation was last updated.
        intelligenceConfigurationIds:
          type: array
          description: The Intelligence Configuration(s) associated with the Conversation.
          items:
            $ref: '#/components/schemas/IntelligenceConfigurationTtid'
        conversationConfigurationId:
          $ref: '#/components/schemas/ConfigurationTtid'
        channels:
