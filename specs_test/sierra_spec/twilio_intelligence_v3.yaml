        - id: intelligence_operator_01kcgy1ew0e9x8re6jq542zt8b
          displayName: Script Adherence
          description: Measuring whether the agent stuck to the script
          version: '1'
          availability: PRIVATE
          author: SELF
          prompt: Your job is to determine if a contact center agent sticks to the
            script. Fetch the script from Knowledge using the Knowledge tool. Rate
            the interaction from 0-{{parameters.scale}}.
          outputFormat: JSON
          outputSchema:
            type: object
            properties:
              score:
                type: integer
              explanation:
                type: string
            required:
            - score
            - explanation
            additionalProperties: false
          trainingExamples:
          - input: This is an example sentence which qualifies the lead as HOT.
            output: '{"score": 5, "explanation": "The agent followed the script closely
              and addressed all key points effectively."}'
          context:
            customerMemory:
              enabled: true
            knowledge:
              enabled: true
          parameters:
            scale:
              type: INTEGER
              default: 5
              required: true
              description: Maximum score for evaluating script adherence.
        - id: intelligence_operator_01kcgy1ew0e9x8re6jq542zt9c
          displayName: Sentiment Analysis
          description: Analyze customer sentiment throughout the conversation
          version: '2'
          availability: PUBLIC
          author: TWILIO
          outputFormat: CLASSIFICATION
          context:
            customerMemory:
              enabled: false
            knowledge:
              enabled: false
          parameters: {}
        meta:
          key: items
          pageSize: 2
          nextToken: next_page_token_example
