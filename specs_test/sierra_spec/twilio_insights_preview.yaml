  headers:
    X-Rate-Limit-Limit:
      schema:
        type: string
    X-Rate-Limit-Remaining:
      schema:
        type: string
    X-Rate-Limit-Config:
      schema:
        type: string
  schemas:
    PaginationMeta:
      type: object
      description: 'Pagination metadata containing navigation tokens and result information,

        this schema should according to convention be added to the response

        payload''s ''meta'' attribute

        '
      required:
      - key
      - pageSize
      properties:
        key:
          type: string
          nullable: false
          description: 'The key of the list property contains the actual data items.

            This enables programmatic iteration over paginated results.

            '
          example: items
        pageSize:
          type: integer
          nullable: false
          description: 'The actual number of items returned in this response.

            May be less than the requested pageSize for the last page.

            '
          example: 20
        previousToken:
          type: string
          nullable: true
          description: 'Token to fetch the previous page of results.

            Only included if there is a previous page, otherwise omitted.

            '
          example: eyJwYWdlIjowLCJxdWVyeSI6ImJvb2tzIn0=
        nextToken:
          type: string
          nullable: true
          description: 'Token to fetch the next page of results.

            Only included if there is a next page, otherwise omitted.

            '
          example: eyJwYWdlIjoyLCJxdWVyeSI6ImJvb2tzIn0=
    QueryDefinition:
      type: object
      description: Structured query definition that specifies what data to retrieve
        and how to filter, group, and order it
      properties:
        measures:
          type: array
          description: Array of measures to retrieve, representing quantitative values
            or metrics to be calculated
          items:
            type: string
          example:
          - OperatorResult.Count
        dimensions:
          type: array
          description: Array of dimensions to retrieve, representing categorical attributes
            for grouping and organizing data
          items:
            type: string
          example:
          - DateCreated
          - OperatorResults
        filters:
          type: array
          description: Nested filter conditions. Always use `op` and `expressions`.
          items:
            type: object
            required:
            - expressions
            properties:
              op:
                type: string
                enum:
                - AND
                - OR
                - EQ
                - NE
                - GT
                - LT
                - IN
                example: AND
              expressions:
                type: array
                items:
                  type: object
                  required:
                  - op
                  - field
                  properties:
                    op:
                      type: string
                      enum:
                      - AND
                      - OR
                      - EQ
                      - NE
                      - GT
                      - LT
                      - IN
                      example: IN
                    field:
                      type: string
                      example: OperatorResult.Value
                    values:
                      type: array
                      items:
                        type: string
                      example:
                      - positive
                      - negative
        orderBy:
          type: array
          description: Specifications for sorting the query results by specific fields
            in ascending or descending order
          items:
            type: object
            properties:
              field:
                type: string
                description: Dimension or measure to order by
                example: OperatorResults.CreatedDate
              direction:
                type: string
                description: Sort order direction, ascending or descending
                enum:
                - ASC
                - DESC
                example: DESC
    InsightsQueryRequest:
      type: object
      required:
      - domain
      - query
      properties:
        domain:
          type: string
          example: Conversations
          description: The business domain to execute the query against
        query:
          $ref: '#/components/schemas/QueryDefinition'
    InsightsQueryResponse:
      type: object
      properties:
        domain:
          type: string
          example: Insights
          description: Indicates the business domain the query was executed against
        items:
          type: array
          description: Array of result objects containing the query results. Each
            object contains properties matching the requested measures and dimensions.
          items:
            type: object
            description: Query result object with dynamic properties based on requested
              measures and dimensions.
            additionalProperties:
              description: Dynamic property values based on requested measures and
                dimensions.
          example:
          - Id: conv1
            Languages:
            - en
            Channels:
            - voice
            OperatorResult.Value: positive
          - Id: conv2
            Languages:
            - en
            - es
            Channels:
            - chat
            OperatorResult.Value: negative
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    InsightsMetadataResponse:
      type: object
      description: Response containing metadata about available cubes, measures, and
        dimensions for a domain
      properties:
        domain:
          type: string
          example: Insights
          description: The business domain name for which metadata is being provided
        cubes:
          type: array
          description: List of data cubes available in the domain, each containing
            measures and dimensions
          items:
            type: object
            required:
            - name
            - measures
            - dimensions
            properties:
              name:
                type: string
                description: Name of the cube, used as a reference in queries
              description:
                type: string
                description: Human-readable description of what the cube represents
              measures:
                type: array
                description: List of measures available in the cube, representing
                  quantitative values that can be aggregated
                items:
                  type: object
                  required:
                  - name
                  - type
                  properties:
                    name:
                      type: string
                      description: Identifier used to reference this measure in queries
                    description:
                      type: string
                      description: Detailed explanation of what this measure represents
                    type:
                      type: string
                      description: Type of the measure
                    aggregation:
                      type: string
                      description: Aggregation type for the measure (e.g., sum, count,
                        average)
              dimensions:
                type: array
                description: List of dimensions available in the cube, representing
                  categorical attributes for grouping data
                items:
                  type: object
                  required:
                  - name
                  - type
                  properties:
                    name:
                      type: string
                      description: Identifier used to reference this dimension in
                        queries
                    description:
                      type: string
                      description: Detailed explanation of what this dimension represents
                    type:
                      type: string
                      description: Data type of the dimension (e.g., string, number,
                        boolean, date)
paths:
  /preview/InsightsDomains/{domainName}/Query:
    servers:
    - url: https://insights.twilio.com
    x-twilio:
      pathType: list
    post:
      summary: Execute a semantic query
      description: Execute a semantic query against the specified domain.
      tags:
      - TwilioInsights
      operationId: CreateQueryResults
      parameters:
      - name: domainName
        in: path
        description: The business domain name to query.
        schema:
          type: string
        required: true
      - name: pageSize
        in: query
        description: Number of items per page
        required: false
        schema:
          type: integer
          minimum: 1
          example: 20
          format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InsightsQueryRequest'
      responses:
        '200':
          description: Successful query response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightsQueryResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    description: Twilio-specific error code
                    type: integer
                    format: int32
                  message:
                    description: A human readable error message
                    type: string
                  httpStatusCode:
                    description: HTTP response status code
                    type: integer
                    format: int32
                  userError:
                    description: Whether the error is a user error (true) or a system
                      error (false)
                    type: boolean
                  params:
                    description: A map of parameters related to the error, for example,
                      a `params.twilioErrorCodeUrl` might hold a URL or link to additional
                      information
                    type: object
                    additionalProperties:
                      type: string
                required:
                - code
                - message
                - httpStatusCode
        429:
          description: Too Many requests (rate limit exceeded for request originating
            from public API)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    description: Twilio-specific error code
                    type: integer
                    format: int32
                  message:
                    description: A human readable error message
                    type: string
                  httpStatusCode:
                    description: HTTP response status code
                    type: integer
                    format: int32
                  userError:
                    description: Whether the error is a user error (true) or a system
                      error (false)
                    type: boolean
                  params:
                    description: A map of parameters related to the error, for example,
                      a `params.twilioErrorCodeUrl` might hold a URL or link to additional
                      information
                    type: object
                    additionalProperties:
                      type: string
                required:
                - code
                - message
                - httpStatusCode
        500:
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    description: Twilio-specific error code
                    type: integer
                    format: int32
                  message:
                    description: A human readable error message
                    type: string
                  httpStatusCode:
                    description: HTTP response status code
                    type: integer
                    format: int32
                  userError:
                    description: Whether the error is a user error (true) or a system
                      error (false)
                    type: boolean
                  params:
                    description: A map of parameters related to the error, for example,
                      a `params.twilioErrorCodeUrl` might hold a URL or link to additional
                      information
                    type: object
                    additionalProperties:
                      type: string
                required:
                - code
                - message
                - httpStatusCode
      security:
      - basic_apikey_or_accountsid: []
    get:
      summary: Fetch semantic query results
      tags:
      - TwilioInsights
      operationId: FetchQueryResults
      parameters:
      - name: domainName
        in: path
        description: The business domain name to query.
        schema:
          type: string
        required: true
      - name: pageToken
        in: query
        description: Pagination token
        required: true
        schema:
          type: string
          example: eyJwYWdlIjoyLCJxdWVyeSI6ImJvb2tzIn0=
      responses:
        '200':
          description: Successful query response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightsQueryResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    description: Twilio-specific error code
                    type: integer
                    format: int32
                  message:
                    description: A human readable error message
