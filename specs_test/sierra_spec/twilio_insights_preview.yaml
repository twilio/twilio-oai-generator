openapi: 3.0.1
info:
  title: Conversational Insights
  description: Query and analyze your Twilio data using semantic queries. Retrieve
    metrics, dimensions, and metadata.
  version: 1.0.0
  x-twilio:
    apiStandards: v1.0
servers:
- url: https://insights.twilio.com
security:
- basic_apikey_or_accountsid: []
tags:
- name: TwilioInsights
  description: Execute semantic queries against your Twilio data. Query for metrics,
    filter by dimensions, and retrieve metadata about available data cubes.
components:
  securitySchemes:
    basic_apikey_or_accountsid:
      scheme: basic
      type: http
      description: This API uses [basic authentication](https://www.twilio.com/docs/glossary/what-is-basic-authentication).
        Use an [API key](https://www.twilio.com/docs/iam/api-keys) as the username
        and the API key secret as the password. You can also use your account SID
        and auth token, but limit their use to local testing.
  responses:
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                description: Twilio-specific error code
                type: integer
                format: int32
              message:
                description: A human readable error message
                type: string
              httpStatusCode:
                description: HTTP response status code
                type: integer
                format: int32
              userError:
                description: Whether the error is a user error (true) or a system
                  error (false)
                type: boolean
              params:
                description: A map of parameters related to the error, for example,
                  a `params.twilioErrorCodeUrl` might hold a URL or link to additional
                  information
                type: object
                additionalProperties:
                  type: string
            required:
            - code
            - message
            - httpStatusCode
    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                description: Twilio-specific error code
                type: integer
                format: int32
              message:
                description: A human readable error message
                type: string
              httpStatusCode:
                description: HTTP response status code
                type: integer
                format: int32
              userError:
                description: Whether the error is a user error (true) or a system
                  error (false)
                type: boolean
              params:
                description: A map of parameters related to the error, for example,
                  a `params.twilioErrorCodeUrl` might hold a URL or link to additional
                  information
                type: object
                additionalProperties:
                  type: string
            required:
            - code
            - message
            - httpStatusCode
    UnauthorizedError:
      description: Unauthorized request
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                description: Twilio-specific error code
                type: integer
                format: int32
              message:
                description: A human readable error message
                type: string
              httpStatusCode:
                description: HTTP response status code
                type: integer
                format: int32
              userError:
                description: Whether the error is a user error (true) or a system
                  error (false)
                type: boolean
              params:
                description: A map of parameters related to the error, for example,
                  a `params.twilioErrorCodeUrl` might hold a URL or link to additional
                  information
                type: object
                additionalProperties:
                  type: string
            required:
            - code
            - message
            - httpStatusCode
    ForbiddenError:
      description: Forbidden request
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                description: Twilio-specific error code
                type: integer
                format: int32
              message:
                description: A human readable error message
                type: string
              httpStatusCode:
                description: HTTP response status code
                type: integer
                format: int32
              userError:
                description: Whether the error is a user error (true) or a system
                  error (false)
                type: boolean
              params:
                description: A map of parameters related to the error, for example,
                  a `params.twilioErrorCodeUrl` might hold a URL or link to additional
                  information
                type: object
                additionalProperties:
                  type: string
            required:
            - code
            - message
            - httpStatusCode
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                description: Twilio-specific error code
                type: integer
                format: int32
              message:
                description: A human readable error message
                type: string
              httpStatusCode:
                description: HTTP response status code
                type: integer
                format: int32
              userError:
                description: Whether the error is a user error (true) or a system
                  error (false)
                type: boolean
              params:
                description: A map of parameters related to the error, for example,
                  a `params.twilioErrorCodeUrl` might hold a URL or link to additional
                  information
                type: object
                additionalProperties:
                  type: string
            required:
            - code
            - message
            - httpStatusCode
    RateLimitError:
      description: Too Many requests (rate limit exceeded for request originating
        from public API)
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                description: Twilio-specific error code
                type: integer
                format: int32
              message:
                description: A human readable error message
                type: string
              httpStatusCode:
                description: HTTP response status code
                type: integer
                format: int32
              userError:
                description: Whether the error is a user error (true) or a system
                  error (false)
                type: boolean
              params:
                description: A map of parameters related to the error, for example,
                  a `params.twilioErrorCodeUrl` might hold a URL or link to additional
                  information
                type: object
                additionalProperties:
                  type: string
            required:
            - code
            - message
